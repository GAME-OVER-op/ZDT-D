name: Copilot Polish

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch for AI attempt"
        required: false
        default: "main"
      branch_prefix:
        description: "Prefix for per-attempt AI branches"
        required: false
        default: "ai-polish"
      target_file:
        description: "Optional exact target file"
        required: false
        default: ""
      max_repair_attempts:
        description: "Maximum build repair attempts"
        required: false
        default: "1"

concurrency:
  group: copilot-polish-controller
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write
  issues: write

jobs:
  polish:
    name: Create isolated Copilot polish PR
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.AI_WORKFLOW_TOKEN }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.AI_WORKFLOW_TOKEN }}

      - name: Install Copilot CLI
        run: |
          set -euo pipefail
          npm install -g @github/copilot

      - name: Prepare isolated AI branch
        id: branch
        run: |
          set -euo pipefail

          BASE_BRANCH="${{ github.event.inputs.base_branch }}"
          BRANCH_PREFIX="${{ github.event.inputs.branch_prefix }}"
          MAX_REPAIRS="${{ github.event.inputs.max_repair_attempts }}"

          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          if [ -z "$BRANCH_PREFIX" ]; then
            BRANCH_PREFIX="copilot-polish"
          fi

          if [ -z "$MAX_REPAIRS" ]; then
            MAX_REPAIRS="1"
          fi

          git config user.name "zdt-copilot-polish"
          git config user.email "actions@github.com"

          git fetch origin "$BASE_BRANCH" --prune

          TS="$(date -u +%Y%m%d-%H%M%S)"
          BRANCH="${BRANCH_PREFIX}/${TS}-${GITHUB_RUN_ID}"

          git checkout -B "$BRANCH" "origin/$BASE_BRANCH"

          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "max_repairs=$MAX_REPAIRS" >> "$GITHUB_OUTPUT"

          echo "COPILOT_POLISH_BASE_BRANCH=$BASE_BRANCH" >> "$GITHUB_ENV"
          echo "COPILOT_POLISH_BRANCH=$BRANCH" >> "$GITHUB_ENV"

          echo "Created branch: $BRANCH"

      - name: Select target file
        id: target
        run: |
          set -euo pipefail

          TARGET_FILE="${{ github.event.inputs.target_file }}"

          if [ -z "$TARGET_FILE" ]; then
            TARGET_FILE="$(scripts/copilot-polish/select-target.sh)"
          fi

          if [ ! -f "$TARGET_FILE" ]; then
            echo "Target file does not exist: $TARGET_FILE" >&2
            exit 1
          fi

          echo "target_file=$TARGET_FILE" >> "$GITHUB_OUTPUT"
          echo "Selected target file: $TARGET_FILE"

      - name: Run conservative Copilot polish
        run: |
          set -euo pipefail
          scripts/copilot-polish/run-copilot-polish.sh "${{ steps.target.outputs.target_file }}"

      - name: Guard diff
        run: |
          set -euo pipefail
          scripts/copilot-polish/guard-diff.sh

      - name: Commit and push AI attempt
        id: commit
        run: |
          set -euo pipefail
          scripts/copilot-polish/commit-if-changed.sh "AI polish: isolated safe improvement"

      - name: Validate with build.yml
        id: validate
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          scripts/copilot-polish/dispatch-build.sh "${{ steps.branch.outputs.branch }}" Release

      - name: Repair failed build once
        id: repair
        if: steps.commit.outputs.changed == 'true' && steps.validate.outcome == 'failure' && steps.branch.outputs.max_repairs != '0'
        continue-on-error: true
        run: |
          set -euo pipefail
          scripts/copilot-polish/repair-from-build-log.sh build.log
          scripts/copilot-polish/guard-diff.sh
          scripts/copilot-polish/commit-if-changed.sh "AI polish: repair build failure"

      - name: Revalidate after repair
        id: revalidate
        if: steps.commit.outputs.changed == 'true' && steps.validate.outcome == 'failure' && steps.repair.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          scripts/copilot-polish/dispatch-build.sh "${{ steps.branch.outputs.branch }}" Release

      - name: Open isolated Pull Request
        if: steps.commit.outputs.changed == 'true' && (steps.validate.outcome == 'success' || steps.revalidate.outcome == 'success')
        run: |
          set -euo pipefail
          scripts/copilot-polish/open-polish-pr.sh

      - name: Delete AI branch if nothing changed
        if: steps.commit.outputs.changed != 'true'
        run: |
          set -euo pipefail
          git push origin --delete "${{ steps.branch.outputs.branch }}" 2>/dev/null || true

      - name: Final result
        run: |
          set -euo pipefail

          if [ "${{ steps.commit.outputs.changed }}" != "true" ]; then
            echo "Copilot did not produce a commit-worthy change."
            exit 0
          fi

          if [ "${{ steps.validate.outcome }}" = "success" ] || [ "${{ steps.revalidate.outcome }}" = "success" ]; then
            echo "Build passed and PR was created."
            exit 0
          fi

          echo "Build did not pass. Deleting failed AI branch."
          git push origin --delete "${{ steps.branch.outputs.branch }}" 2>/dev/null || true
          exit 1
