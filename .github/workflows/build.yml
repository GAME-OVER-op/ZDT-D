          fi
          echo "Build tags: $SING_BOX_TAGS"
          echo "Extra ldflags: $SING_BOX_LDFLAGS"
          GOOS=android \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm }} \
          CGO_ENABLED=${{ matrix.cgo_enabled }} \
            go build \
              -tags "$SING_BOX_TAGS" \
              -trimpath \
              -ldflags="-X 'github.com/sagernet/sing-box/constant.Version=${SING_BOX_VERSION}' ${SING_BOX_LDFLAGS} -s -w -buildid=" \
              -o "$ARTIFACT_DIR/sing-box" \
              ./cmd/sing-box
          popd > /dev/null

          chmod 755 "$ARTIFACT_DIR/sing-box"

          cat > "$ARTIFACT_DIR/sing-box.version" <<EOF_SING_BOX_VERSION
          source=https://github.com/SagerNet/sing-box
          ref=$SING_BOX_REF
          commit=$SING_BOX_COMMIT
          binary=sing-box
          target=android-arm64
          tags=$SING_BOX_TAGS
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_SING_BOX_VERSION

          echo "=== Verify sing-box artifact ==="
          file "$ARTIFACT_DIR/sing-box"
          readelf -h "$ARTIFACT_DIR/sing-box" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/sing-box" | tee "$ARTIFACT_DIR/sing-box.dynamic.txt" || true
          "$ARTIFACT_DIR/sing-box" version || true
          "$ARTIFACT_DIR/sing-box" help | head -60 || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/sing-box.version"

      - name: Upload sing-box binary
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/sing-box/sing-box
            out/artifacts/sing-box/sing-box.version
            out/artifacts/sing-box/sing-box.commit
