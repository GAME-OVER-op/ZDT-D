          export AR="$NFQWS2_AR"
          export AS="$NFQWS2_CC"
          export RANLIB="$NFQWS2_RANLIB"
          export STRIP="$NFQWS2_STRIP"
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig"

          download() {
            local url="$1"
            local out="$2"
            curl -fL --retry 5 --retry-delay 3 "$url" -o "$out"
            test -s "$out" || { echo "::error::Download failed: $url"; exit 1; }
          }

          echo "=== Resolve latest zapret2 release tag ==="
          ZAPRET2_REF="$(git ls-remote --tags --refs https://github.com/bol-van/zapret2.git 'v*' \
            | awk -F/ '{print $NF}' \
            | sort -V \
            | tail -1)"
          if [[ -z "$ZAPRET2_REF" ]]; then
            echo "::error::Unable to resolve latest zapret2 tag"
            exit 1
          fi
          echo "ZAPRET2_REF=$ZAPRET2_REF"

          echo "=== Fetch zapret2 $ZAPRET2_REF ==="
          git clone --depth 1 --branch "$ZAPRET2_REF" https://github.com/bol-van/zapret2.git "$SRC/zapret2"
          ZAPRET2_COMMIT="$(git -C "$SRC/zapret2" rev-parse HEAD)"
          echo "$ZAPRET2_REF" | tee "$ARTIFACT_DIR/zapret2.ref"
          echo "$ZAPRET2_COMMIT" | tee "$ARTIFACT_DIR/zapret2.commit"

          echo "=== Collect zapret2 Lua scripts from the same source checkout ==="
          test -d "$SRC/zapret2/lua" || { echo "::error::zapret2 lua directory not found"; exit 1; }
          mkdir -p "$ARTIFACT_DIR/lua"
          cp -a "$SRC/zapret2/lua/." "$ARTIFACT_DIR/lua/"
          test -s "$ARTIFACT_DIR/lua/zapret-lib.lua" || { echo "::error::zapret2 zapret-lib.lua missing"; exit 1; }
          grep -n 'NFQWS2_COMPAT_VER_REQUIRED' "$ARTIFACT_DIR/lua/zapret-lib.lua" || true

          echo "=== Build LuaJIT for Android arm64 ==="
          LUAJIT_VER="2.1"
          LUAJIT_RELEASE="2.1-20250826"
          LUAJIT_LUAVER="5.1"
          download "https://github.com/openresty/luajit2/archive/refs/tags/v${LUAJIT_RELEASE}.tar.gz" "$SRC/luajit2.tar.gz"
          tar -xzf "$SRC/luajit2.tar.gz" -C "$BUILD"
          luajitdir="$(find "$BUILD" -maxdepth 1 -type d -name 'luajit2-*' | head -1)"
          test -d "$luajitdir" || { echo "::error::LuaJIT source directory not found"; exit 1; }
          pushd "$luajitdir" > /dev/null
          if [[ "${{ matrix.goarch }}" = "arm" ]]; then
            LUAJIT_HOST_CC="gcc -m32"
          else
            LUAJIT_HOST_CC="cc"
          fi
          make \
            BUILDMODE=static \
            XCFLAGS="-DLUAJIT_DISABLE_FFI" \
            HOST_CC="$LUAJIT_HOST_CC" \
            CROSS= \
            CC="$NFQWS2_CC" \
            TARGET_AR="$NFQWS2_AR rcus" \
            TARGET_STRIP="$NFQWS2_STRIP" \
            TARGET_CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections" \
            TARGET_LDFLAGS="-Wl,--gc-sections -flto=auto" \
            -j"$(nproc)"
          make install PREFIX= DESTDIR="$DEPS_DIR"
          popd > /dev/null
          LJIT=1
          LCFLAGS="-I${DEPS_DIR}/include/luajit-${LUAJIT_VER}"
          LLIB="-L${DEPS_DIR}/lib -lluajit-${LUAJIT_LUAVER}"

          echo "=== Download netfilter/zlib dependencies ==="
          download "https://www.netfilter.org/pub/libnfnetlink/libnfnetlink-1.0.2.tar.bz2" "$SRC/libnfnetlink.tar.bz2"
          download "https://www.netfilter.org/pub/libmnl/libmnl-1.0.5.tar.bz2" "$SRC/libmnl.tar.bz2"
          download "https://www.netfilter.org/pub/libnetfilter_queue/libnetfilter_queue-1.0.5.tar.bz2" "$SRC/libnetfilter_queue.tar.bz2"

          ZLIB_REF="$(curl -fsSL --retry 5 --retry-delay 3 https://api.github.com/repos/madler/zlib/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          test -n "$ZLIB_REF" || { echo "::error::Unable to resolve zlib latest tag"; exit 1; }
          download "https://github.com/madler/zlib/archive/refs/tags/${ZLIB_REF}.tar.gz" "$SRC/zlib.tar.gz"

          tar -xjf "$SRC/libnfnetlink.tar.bz2" -C "$BUILD"
          tar -xjf "$SRC/libmnl.tar.bz2" -C "$BUILD"
          tar -xjf "$SRC/libnetfilter_queue.tar.bz2" -C "$BUILD"
          tar -xzf "$SRC/zlib.tar.gz" -C "$BUILD"

          echo "=== Patch libnetfilter_queue for Android ==="
          patch -p1 -d "$BUILD"/libnetfilter_queue-* -i "$SRC/zapret2/.github/workflows/libnetfilter_queue-android.patch"

          echo "=== Build netfilter dependencies ==="
          for lib in libmnl libnfnetlink libnetfilter_queue; do
            libdir="$(find "$BUILD" -maxdepth 1 -type d -name "${lib}-*" | head -1)"
            test -d "$libdir" || { echo "::error::Source directory not found for $lib"; exit 1; }
            pushd "$libdir" > /dev/null
            CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections -Wno-implicit-function-declaration" \
            LDFLAGS="-Wl,--gc-sections -flto=auto" \
              ./configure \
                --prefix= \
                --host="$NFQWS2_TARGET" \
                --enable-static \
                --disable-shared \
                --disable-dependency-tracking
            make -j"$(nproc)"
            make install -j"$(nproc)" DESTDIR="$DEPS_DIR"
            popd > /dev/null
            sed -i "s|^prefix=.*|prefix=$DEPS_DIR|g" "$DEPS_DIR/lib/pkgconfig/$lib.pc"
          done

          echo "=== Build zlib $ZLIB_REF ==="
          zlibdir="$(find "$BUILD" -maxdepth 1 -type d -name 'zlib-*' | head -1)"
          test -d "$zlibdir" || { echo "::error::zlib source directory not found"; exit 1; }
          pushd "$zlibdir" > /dev/null
          CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections" ./configure --prefix= --static
          make -j"$(nproc)"
          make install -j"$(nproc)" DESTDIR="$DEPS_DIR"
          popd > /dev/null

          echo "=== Build nfqws2 from zapret2 $ZAPRET2_REF ==="
          NFQWS2_VERSION_CFLAGS="-DZAPRET_GH_VER=\\\"$ZAPRET2_REF\\\" -DZAPRET_GH_HASH=\\\"$ZAPRET2_COMMIT\\\""
          CFLAGS="$NFQWS2_VERSION_CFLAGS -I$DEPS_DIR/include -Oz -flto=auto -ffunction-sections -fdata-sections" \
          LDFLAGS="-L$DEPS_DIR/lib -Wl,--gc-sections -flto=auto -Wl,-z,max-page-size=16384" \
            make -C "$SRC/zapret2/nfq2" \
              LUA_JIT="$LJIT" \
              LUA_CFLAGS="$LCFLAGS" \
              LUA_LIB="$LLIB" \
              -j"$(nproc)" \
              android

          cp -f "$SRC/zapret2/nfq2/nfqws2" "$ARTIFACT_DIR/nfqws2"
          chmod 755 "$ARTIFACT_DIR/nfqws2"

          echo "=== Clean and verify nfqws2 ELF ==="
          CLEANER_TAG="$(curl -fsSL --retry 5 --retry-delay 3 https://api.github.com/repos/termux/termux-elf-cleaner/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          if [[ -n "$CLEANER_TAG" ]]; then
            download "https://github.com/termux/termux-elf-cleaner/releases/download/${CLEANER_TAG}/termux-elf-cleaner" "$WORK/termux-elf-cleaner"
            chmod +x "$WORK/termux-elf-cleaner"
            "$WORK/termux-elf-cleaner" --api-level "$NFQWS2_ANDROID_API" "$ARTIFACT_DIR/nfqws2"
          fi
          "$NFQWS2_STRIP" --strip-unneeded "$ARTIFACT_DIR/nfqws2" || true

          cat > "$ARTIFACT_DIR/nfqws2.version" <<EOF_NFQWS2_VERSION
          source=https://github.com/bol-van/zapret2
          zapret2_ref=$ZAPRET2_REF
          zapret2_commit=$ZAPRET2_COMMIT
          binary=nfqws2
          target=android-arm64
          android_api=$NFQWS2_ANDROID_API
          luajit_release=$LUAJIT_RELEASE
          zlib_ref=$ZLIB_REF
          libmnl_version=1.0.5
          libnfnetlink_version=1.0.2
          libnetfilter_queue_version=1.0.5
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_NFQWS2_VERSION

          file "$ARTIFACT_DIR/nfqws2"
          readelf -h "$ARTIFACT_DIR/nfqws2" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/nfqws2" | tee "$ARTIFACT_DIR/nfqws2.dynamic.txt" || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/nfqws2.version"

      - name: Upload nfqws2 binary
        uses: actions/upload-artifact@v7
        with:
          name: nfqws2-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/nfqws2/nfqws2
            out/artifacts/nfqws2/nfqws2.version
            out/artifacts/nfqws2/zapret2.ref
            out/artifacts/nfqws2/zapret2.commit
            out/artifacts/nfqws2/nfqws2.dynamic.txt
            out/artifacts/nfqws2/lua
          retention-days: 1

  build_torproxy:
    name: build Tor ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            bison \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libtool \
            make \
            perl \
            pkg-config \
            python3

          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "TOR_HOST=${{ matrix.tor_host }}"
            echo "TOR_CC=$NDK_BIN/${{ matrix.clang_prefix }}${TOR_ANDROID_API_LEVEL}-clang"
            echo "TOR_CXX=$NDK_BIN/${{ matrix.clang_prefix }}${TOR_ANDROID_API_LEVEL}-clang++"
            echo "TOR_AR=$NDK_BIN/llvm-ar"
            echo "TOR_RANLIB=$NDK_BIN/llvm-ranlib"
            echo "TOR_STRIP=$NDK_BIN/llvm-strip"
          } >> "$GITHUB_ENV"

      - name: Build Tor C from official source
        run: |
          set -euo pipefail

          for tool in "$TOR_CC" "$TOR_CXX" "$TOR_AR" "$TOR_RANLIB" "$TOR_STRIP"; do
            test -x "$tool" || { echo "::error::Tool not found: $tool"; exit 1; }
          done
          "$TOR_CC" --version | head -1

          WORK="$PWD/out/build/tor-android"
          SRC="$WORK/src"
          BUILD="$WORK/build"
          PREFIX="$WORK/prefix"
          ARTIFACT_DIR="$PWD/out/artifacts/torproxy"
          mkdir -p "$SRC" "$BUILD" "$PREFIX" "$ARTIFACT_DIR"

          export CC="$TOR_CC"
          export CXX="$TOR_CXX"
          export AR="$TOR_AR"
          export RANLIB="$TOR_RANLIB"
          export STRIP="$TOR_STRIP"
          export ac_cv_prog_AR="$TOR_AR"
          export ac_cv_prog_RANLIB="$TOR_RANLIB"
          export ac_cv_prog_STRIP="$TOR_STRIP"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          export CPPFLAGS="-I$PREFIX/include -D__ANDROID_API__=$TOR_ANDROID_API_LEVEL"
          export CFLAGS="-Os -fPIC -fPIE -D__ANDROID_API__=$TOR_ANDROID_API_LEVEL"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-L$PREFIX/lib -pie"

          echo "=== Fetch Tor dependencies ==="
          git clone --depth 1 --branch "$TOR_ZLIB_REF" https://github.com/madler/zlib "$SRC/zlib"
          git clone --depth 1 --branch "$TOR_ZSTD_REF" https://github.com/facebook/zstd "$SRC/zstd"
          git clone --depth 1 --branch "$TOR_OPENSSL_REF" https://github.com/openssl/openssl "$SRC/openssl"
          git clone --depth 1 --branch "$TOR_LIBEVENT_REF" https://github.com/libevent/libevent "$SRC/libevent"

          echo "=== Build zlib (${TOR_ZLIB_REF}) ==="
          pushd "$SRC/zlib" > /dev/null
          CHOST="$TOR_HOST" ./configure --prefix="$PREFIX" --static
          make -j"$(nproc)"
          make install
          popd > /dev/null

          echo "=== Build zstd (${TOR_ZSTD_REF}) ==="
          make -C "$SRC/zstd/lib" -j"$(nproc)" \
            CC="$CC" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            CFLAGS="$CFLAGS" \
            HAVE_ZLIB=0 \
            HAVE_LZMA=0 \
            HAVE_LZ4=0 \
            BUILD_SHARED=no \
            libzstd.a
          make -C "$SRC/zstd/lib" \
            PREFIX="$PREFIX" \
            BUILD_SHARED=no \
            install-static install-includes

          echo "=== Build OpenSSL (${TOR_OPENSSL_REF}) ==="
          pushd "$SRC/openssl" > /dev/null
          ./Configure ${{ matrix.openssl_target }} \
            no-shared \
            no-tests \
            no-apps \
            --prefix="$PREFIX" \
            --openssldir="$PREFIX/ssl" \
            -D__ANDROID_API__=$TOR_ANDROID_API_LEVEL
          make -j"$(nproc)"
          make install_sw
          popd > /dev/null

          echo "=== Build libevent (${TOR_LIBEVENT_REF}) ==="
          pushd "$SRC/libevent" > /dev/null
          ./autogen.sh
          ./configure \
            --host="$TOR_HOST" \
            --prefix="$PREFIX" \
            --enable-static \
            --disable-shared \
            --disable-openssl
          make -j"$(nproc)"
          make install
          popd > /dev/null

          echo "=== Fetch official Tor source ==="
          git clone --depth 1 --branch "$TOR_REF" https://gitlab.torproject.org/tpo/core/tor "$SRC/tor"
          TOR_COMMIT="$(git -C "$SRC/tor" rev-parse HEAD)"
          printf '%s\n' "$TOR_COMMIT" | tee "$ARTIFACT_DIR/torproxy.commit"

          echo "=== Build Tor C (${TOR_REF}) ==="
          pushd "$SRC/tor" > /dev/null
          ./autogen.sh
          ./configure \
            --host="$TOR_HOST" \
            --prefix="$PREFIX" \
            --disable-tool-name-check \
            --disable-asciidoc \
            --disable-manpage \
            --disable-html-manual \
            --disable-system-torrc \
            --disable-unittests \
            --disable-module-dirauth \
            --disable-seccomp \
            --disable-systemd \
            --enable-static-openssl \
            --with-openssl-dir="$PREFIX" \
            --with-libevent-dir="$PREFIX" \
            --with-zlib-dir="$PREFIX" \
            --with-zstd-dir="$PREFIX"
          make -j"$(nproc)"
          popd > /dev/null

          TOR_OUTPUT=""
          for candidate in \
            "$SRC/tor/src/app/tor" \
            "$SRC/tor/src/or/tor" \
            "$SRC/tor/src/tor"; do
            if [[ -s "$candidate" ]]; then
              TOR_OUTPUT="$candidate"
              break
            fi
          done
          test -n "$TOR_OUTPUT" || { echo "::error::Tor output binary not found"; find "$SRC/tor" -maxdepth 4 -type f -perm -111 | sort | head -200; exit 1; }
          cp -f "$TOR_OUTPUT" "$ARTIFACT_DIR/torproxy"
          "$TOR_STRIP" --strip-unneeded "$ARTIFACT_DIR/torproxy" || true
          chmod 755 "$ARTIFACT_DIR/torproxy"

          cat > "$ARTIFACT_DIR/torproxy.version" <<EOF_TOR_VERSION
          source=https://gitlab.torproject.org/tpo/core/tor
          ref=$TOR_REF
          commit=$TOR_COMMIT
          upstream_binary=tor
          packaged_binary=torproxy
          target=android-arm64
          android_api=$TOR_ANDROID_API_LEVEL
          openssl_ref=$TOR_OPENSSL_REF
          libevent_ref=$TOR_LIBEVENT_REF
          zlib_ref=$TOR_ZLIB_REF
          zstd_ref=$TOR_ZSTD_REF
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_TOR_VERSION

          echo "=== Verify torproxy artifact ==="
          file "$ARTIFACT_DIR/torproxy"
          readelf -h "$ARTIFACT_DIR/torproxy" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/torproxy" | tee "$ARTIFACT_DIR/torproxy.dynamic.txt" || true
          "$ARTIFACT_DIR/torproxy" --version || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/torproxy.version"

      - name: Upload Tor binary
        uses: actions/upload-artifact@v7
        with:
          name: torproxy-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/torproxy/torproxy
            out/artifacts/torproxy/torproxy.version
            out/artifacts/torproxy/torproxy.commit
            out/artifacts/torproxy/torproxy.dynamic.txt
          retention-days: 1

  build_lyrebird:
    name: build lyrebird ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.12'
          cache: false

      - name: Set up Android SDK for Go cgo
        uses: android-actions/setup-android@v3

      - name: Install Android NDK for Go cgo
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          GO_CC="$NDK_BIN/${{ matrix.clang_prefix }}24-clang"
          GO_CXX="$NDK_BIN/${{ matrix.clang_prefix }}24-clang++"
          test -x "$GO_CC" || { echo "::error::Android Go cgo compiler not found: $GO_CC"; exit 1; }
          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CC=$GO_CC"
            echo "CXX=$GO_CXX"
          } >> "$GITHUB_ENV"

      - name: Build lyrebird from official source
        run: |
          set -euo pipefail

          go version

          WORK="$PWD/out/build/lyrebird-android"
          SRC="$WORK/src"
          ARTIFACT_DIR="$PWD/out/artifacts/lyrebird"
          mkdir -p "$SRC" "$ARTIFACT_DIR"

          echo "=== Fetch official lyrebird source ==="
          git clone --depth 1 --branch "$LYREBIRD_REF" https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/lyrebird "$SRC/lyrebird"
          LYREBIRD_COMMIT="$(git -C "$SRC/lyrebird" rev-parse HEAD)"
          printf '%s\n' "$LYREBIRD_COMMIT" | tee "$ARTIFACT_DIR/lyrebird.commit"

          echo "=== Build lyrebird (${LYREBIRD_REF}) ==="
          pushd "$SRC/lyrebird" > /dev/null
          LYREBIRD_PACKAGE="./cmd/lyrebird"
          if [[ ! -d "$LYREBIRD_PACKAGE" ]]; then
            LYREBIRD_PACKAGE="$(find ./cmd -maxdepth 3 -name '*.go' -type f -printf '%h\n' 2>/dev/null | sort -u | grep '/lyrebird' | head -1 || true)"
          fi
          test -n "$LYREBIRD_PACKAGE" || { echo "::error::lyrebird command package not found"; find . -maxdepth 4 -type f | sort | head -200; exit 1; }
          echo "Build package: $LYREBIRD_PACKAGE"
          GOOS=android \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm }} \
          CGO_ENABLED=${{ matrix.cgo_enabled }} \
            go build \
              -trimpath \
              -buildvcs=false \
              -ldflags="-s -w -buildid=" \
              -o "$ARTIFACT_DIR/lyrebird" \
              "$LYREBIRD_PACKAGE"
          popd > /dev/null

          chmod 755 "$ARTIFACT_DIR/lyrebird"

          cat > "$ARTIFACT_DIR/lyrebird.version" <<EOF_LYREBIRD_VERSION
          source=https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/lyrebird
          ref=$LYREBIRD_REF
          commit=$LYREBIRD_COMMIT
          binary=lyrebird
          target=android-arm64
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_LYREBIRD_VERSION

          echo "=== Verify lyrebird artifact ==="
          file "$ARTIFACT_DIR/lyrebird"
          readelf -h "$ARTIFACT_DIR/lyrebird" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/lyrebird" | tee "$ARTIFACT_DIR/lyrebird.dynamic.txt" || true
          "$ARTIFACT_DIR/lyrebird" -version || true
          "$ARTIFACT_DIR/lyrebird" -h | head -80 || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/lyrebird.version"

      - name: Upload lyrebird binary
        uses: actions/upload-artifact@v7
        with:
          name: lyrebird-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/lyrebird/lyrebird
            out/artifacts/lyrebird/lyrebird.version
            out/artifacts/lyrebird/lyrebird.commit
            out/artifacts/lyrebird/lyrebird.dynamic.txt
          retention-days: 1

  module_binaries_ready:
    name: Module binaries ready (OpenVPN + AmneziaWG + wireproxy + tun2socks + mihomo + sing-box + byedpi + dnscrypt + mieru + opera-proxy + DPITunnel + Tor + lyrebird + nfqws + nfqws2)
    runs-on: ubuntu-latest
    needs:
      - build_openvpn
      - build_amneziawg
      - build_wireproxy
      - build_tun2socks
      - build_mihomo
      - build_singbox
      - build_byedpi
      - build_dnscrypt
      - build_mieru
      - build_operaproxy
      - build_dpitunnel
      - build_torproxy
      - build_lyrebird
      - build_nfqws
      - build_nfqws2
    if: >-
      needs.build_openvpn.result == 'success' &&
      needs.build_amneziawg.result == 'success' &&
      needs.build_wireproxy.result == 'success' &&
      needs.build_tun2socks.result == 'success' &&
      needs.build_mihomo.result == 'success' &&
      needs.build_singbox.result == 'success' &&
      needs.build_byedpi.result == 'success' &&
      needs.build_dnscrypt.result == 'success' &&
      needs.build_mieru.result == 'success' &&
      needs.build_operaproxy.result == 'success' &&
      needs.build_dpitunnel.result == 'success' &&
      needs.build_torproxy.result == 'success' &&
      needs.build_lyrebird.result == 'success' &&
      needs.build_nfqws.result == 'success' &&
      needs.build_nfqws2.result == 'success'

    steps:
      - name: Mark module binaries ready
        run: echo "External module binary artifacts are ready for module packaging"

  build_zygisk:
    name: build Zygisk module ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Build Zygisk ${{ matrix.abi }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_ROOT }}
          NDK_ROOT: ${{ env.NDK_ROOT }}
          ANDROID_API_LEVEL: 24
        run: |
          set -euo pipefail
          mkdir -p out/zygisk
          ZDT_ZYGISK_ABI=${{ matrix.abi }} ./zygisk/build.sh out/zygisk/${{ matrix.abi }}.so
          file out/zygisk/${{ matrix.abi }}.so
          test -s out/zygisk/${{ matrix.abi }}.so
          readelf -Ws out/zygisk/${{ matrix.abi }}.so | grep -q ' zygisk_module_entry$'
          if readelf -d out/zygisk/${{ matrix.abi }}.so | grep -E 'NEEDED.*(libc\+\+|libstdc\+\+)' >/dev/null 2>&1; then
            echo "::error::Zygisk binary must not depend on C++ STL runtime"
            exit 1
          fi

      - name: Upload Zygisk binary
        uses: actions/upload-artifact@v7
        with:
          name: zygisk-${{ matrix.artifact_suffix }}
          path: out/zygisk/${{ matrix.abi }}.so
          retention-days: 1

  module_zygisk_ready:
    name: 3 Module Zygisk ready
    runs-on: ubuntu-latest
    needs:
      - build_zygisk
    if: needs.build_zygisk.result == 'success'

    steps:
      - name: Mark Zygisk binary ready
        run: echo "Zygisk artifact is ready for module packaging"

  pack_module:
    name: 5 Pack module ZIP
    runs-on: ubuntu-latest
    needs:
      - module_core_ready
      - module_binaries_ready
      - module_zygisk_ready
    if: >-
      needs.module_core_ready.result == 'success' &&
      needs.module_binaries_ready.result == 'success' &&
      needs.module_zygisk_ready.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download zdtd arm64
        uses: actions/download-artifact@v7
        with:
          name: zdtd-arm64
          path: out/artifacts/zdtd/arm64
      - name: Download t2s arm64
        uses: actions/download-artifact@v7
        with:
          name: t2s-arm64
          path: out/artifacts/t2s/arm64
      - name: Download zygisk arm64
        uses: actions/download-artifact@v7
