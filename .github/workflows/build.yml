name: Build ZDT-D

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: zdt-d-service-build
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: 36
  ZDT_COMPILE_SDK: 36
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  GRADLE_VERSION: "9.4.1"
  CARGO_PROFILE: release
  CARGO_BUILD_TARGET: aarch64-linux-android
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  NO_DASHBOARD: "1"
  OPENVPN_VERSION: "2.7.4"
  MBEDTLS_VERSION: "3.6.6"
  MBEDTLS_SHA256: "8fb65fae8dcae5840f793c0a334860a411f884cc537ea290ce1c52bb64ca007a"
  LZO_VERSION: "2.10"
  LZ4_VERSION: "1.10.0"
  OPENVPN_ANDROID_API_LEVEL: 24
  AMNEZIAWG_GO_REF: "master"
  AMNEZIAWG_TOOLS_REF: "v1.0.20260223"
  AMNEZIAWG_ANDROID_API_LEVEL: 24
  AMNEZIAWG_UAPI_RUN_DIR: "/data/adb/modules/ZDT-D/working_folder/amneziawg/run"
  AMNEZIAWG_UAPI_SOCKET_DIR: "/data/adb/modules/ZDT-D/working_folder/amneziawg/run/amneziawg"
  AMNEZIAWG_GO_UAPI_SOCKET_DIR: "run/amneziawg"
  WIREPROXY_REF: "v1.1.2"
  TUN2SOCKS_REF: "v2.6.0"
  MIHOMO_REF: "v1.19.27"
  SING_BOX_REF: "v1.13.14"
  BYEDPI_REF: "v0.17.3"
  BYEDPI_ANDROID_API_LEVEL: 24
  DNSCRYPT_PROXY_REF: "2.1.16"
  MIERU_REF: "v3.34.0"
  OPERA_PROXY_REF: "v1.26.0"
  DPITUNNEL_REF: "main"
  DPITUNNEL_ANDROID_API_LEVEL: 24
  DPITUNNEL_OPENSSL_REF: "openssl-3.3.2"
  TOR_REF: "tor-0.4.9.9"
  TOR_ANDROID_API_LEVEL: 24
  TOR_OPENSSL_REF: "openssl-3.5.7"
  TOR_LIBEVENT_REF: "release-2.1.12-stable"
  TOR_ZLIB_REF: "v1.3.2"
  TOR_ZSTD_REF: "v1.5.7"
  LYREBIRD_REF: "main"
  TG_WS_PROXY_REF: "v1.6.4"

permissions:
  contents: write
  models: read

jobs:
  check_paths:
    name: Check tracked changes
    runs-on: ubuntu-latest
    outputs:
      paths_changed: ${{ steps.detect.outputs.paths_changed }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect tracked build paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          paths_changed=false
          reason="No tracked build paths changed"
          changed_files=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; path check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              changed_files="$(git diff --name-only "$base" "$head" || true)"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$head" || true)"
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(application/|zygisk/|rust/|module_template/|prebuilt/|scripts/module/|\.github/workflows/build\.yml$|module\.prop$)'; then
              paths_changed=true
              reason="Tracked build paths changed"
            fi
          fi

          {
            echo "### Check tracked changes"
            echo
            echo "Paths changed: \`$paths_changed\`"
            echo "Reason: $reason"
            echo
            echo "Tracked paths:"
            echo "- application/**"
            echo "- zygisk/**"
            echo "- rust/**"
            echo "- module_template/**"
            echo "- prebuilt/**"
            echo "- scripts/module/**"
            echo "- .github/workflows/build.yml"
            echo "- module.prop"
            if [[ -n "$changed_files" ]]; then
              echo
              echo "Changed files:"
              printf '%s\n' "$changed_files" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "paths_changed=$paths_changed" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  check_force_phrase:
    name: Check manual compile phrase
    runs-on: ubuntu-latest
    outputs:
      force_compile: ${{ steps.detect.outputs.force_compile }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect force phrase
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_PHRASE: auto run compile
        run: |
          set -euo pipefail

          force_compile=false
          reason="Force phrase not found"
          commit_messages=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; force phrase check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              commit_messages="$(git log --format=%B "${base}..${head}" || true)"
            else
              commit_messages="$(git log -1 --format=%B "$head" || true)"
            fi

            if printf '%s\n' "$commit_messages" | grep -qiF "$FORCE_PHRASE"; then
              force_compile=true
              reason="Commit message contains '$FORCE_PHRASE'"
            fi
          fi

          {
            echo "### Check manual compile phrase"
            echo
            echo "Force compile: \`$force_compile\`"
            echo "Reason: $reason"
            echo
            echo "Force phrase: \`$FORCE_PHRASE\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "force_compile=$force_compile" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  build_gate:
    name: ZDT-D build gate
    runs-on: ubuntu-latest
    needs:
      - check_paths
      - check_force_phrase
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      reason: ${{ steps.gate.outputs.reason }}
      build_start_ts: ${{ steps.gate.outputs.build_start_ts }}

    steps:
      - name: Decide whether to compile
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PATHS_CHANGED: ${{ needs.check_paths.outputs.paths_changed }}
          FORCE_COMPILE: ${{ needs.check_force_phrase.outputs.force_compile }}
          PATH_REASON: ${{ needs.check_paths.outputs.reason }}
          FORCE_REASON: ${{ needs.check_force_phrase.outputs.reason }}
        run: |
          set -euo pipefail

          should_build=false
          reason="No build-related changes detected"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_build=true
            reason="Manual workflow_dispatch run"
          elif [[ "$FORCE_COMPILE" == "true" ]]; then
            should_build=true
            reason="$FORCE_REASON"
          elif [[ "$PATHS_CHANGED" == "true" ]]; then
            should_build=true
            reason="$PATH_REASON"
          fi

          build_start_ts="$(date +%s)"

          {
            echo "### ZDT-D build gate"
            echo
            echo "Should build: \`$should_build\`"
            echo "Reason: $reason"
            echo
            echo "Inputs:"
            echo "- Tracked paths changed: \`$PATHS_CHANGED\`"
            echo "- Force phrase matched: \`$FORCE_COMPILE\`"
            echo "- Event: \`$EVENT_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "build_start_ts=$build_start_ts" >> "$GITHUB_OUTPUT"

          echo "should_build=$should_build"
          echo "reason=$reason"

  build_zdtd:
    name: build zdtd ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/${{ matrix.clang_prefix }}21-clang"
          ANDROID_CXX="$NDK_BIN/${{ matrix.clang_prefix }}21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
            echo "CC_armv7_linux_androideabi=$ANDROID_CC"
            echo "CXX_armv7_linux_androideabi=$ANDROID_CXX"
            echo "AR_armv7_linux_androideabi=$ANDROID_AR"
            echo "RANLIB_armv7_linux_androideabi=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF2
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          [target.armv7-linux-androideabi]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF2

      - name: Cache Cargo registry and zdtd target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-zdtd-${{ matrix.rust_target }}-${{ hashFiles('rust/Cargo.lock', 'rust/zdtd/Cargo.toml') }}
          restore-keys: |
            cargo-zdtd-${{ matrix.rust_target }}-
            cargo-${{ matrix.rust_target }}-

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ matrix.rust_target }}'
          cargo -V
          rustc -V

      - name: Build zdtd
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/zdtd/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ matrix.rust_target }}"

      - name: Collect zdtd
        run: |
          set -euo pipefail
          SRC="rust/target/${{ matrix.rust_target }}/${{ env.CARGO_PROFILE }}/zdtd"
          DST="out/artifacts/zdtd"
          test -s "$SRC" || { echo "::error::zdtd artifact missing after build: $SRC"; exit 1; }
          mkdir -p "$DST"
          cp -f "$SRC" "$DST/zdtd"
          chmod 755 "$DST/zdtd"
          ls -lh "$DST/zdtd"

      - name: Upload zdtd binary
        uses: actions/upload-artifact@v7
        with:
          name: zdtd-${{ matrix.artifact_suffix }}
          path: out/artifacts/zdtd/zdtd
          retention-days: 1

  build_t2s:
    name: build T2S ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/${{ matrix.clang_prefix }}21-clang"
          ANDROID_CXX="$NDK_BIN/${{ matrix.clang_prefix }}21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
            echo "CC_armv7_linux_androideabi=$ANDROID_CC"
            echo "CXX_armv7_linux_androideabi=$ANDROID_CXX"
            echo "AR_armv7_linux_androideabi=$ANDROID_AR"
            echo "RANLIB_armv7_linux_androideabi=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF2
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          [target.armv7-linux-androideabi]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF2

      - name: Cache Cargo registry and t2s target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-t2s-${{ matrix.rust_target }}-${{ hashFiles('rust/Cargo.lock', 'rust/T2s/Cargo.toml') }}
          restore-keys: |
            cargo-t2s-${{ matrix.rust_target }}-
            cargo-${{ matrix.rust_target }}-

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ matrix.rust_target }}'
          cargo -V
          rustc -V

      - name: Build t2s
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/T2s/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ matrix.rust_target }}"

      - name: Collect t2s
        run: |
          set -euo pipefail
          SRC="rust/target/${{ matrix.rust_target }}/${{ env.CARGO_PROFILE }}/t2s"
          DST="out/artifacts/t2s"
          test -s "$SRC" || { echo "::error::t2s artifact missing after build: $SRC"; exit 1; }
          mkdir -p "$DST"
          cp -f "$SRC" "$DST/t2s"
          chmod 755 "$DST/t2s"
          ls -lh "$DST/t2s"

      - name: Upload t2s binary
        uses: actions/upload-artifact@v7
        with:
          name: t2s-${{ matrix.artifact_suffix }}
          path: out/artifacts/t2s/t2s
          retention-days: 1

  module_core_ready:
    name: 1 Core ready (zdtd + T2S)
    runs-on: ubuntu-latest
    needs:
      - build_zdtd
      - build_t2s
    if: >-
      needs.build_zdtd.result == 'success' &&
      needs.build_t2s.result == 'success'

    steps:
      - name: Mark core binaries ready
        run: echo "zdtd and T2S artifacts are ready for module packaging"

  build_openvpn:
    name: build OpenVPN ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            bzip2 \
            cmake \
            file \
            libtool \
            make \
            pkg-config \
            xz-utils

          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "OPENVPN_CC=$NDK_BIN/${{ matrix.clang_prefix }}${{ env.OPENVPN_ANDROID_API_LEVEL }}-clang"
            echo "OPENVPN_CXX=$NDK_BIN/${{ matrix.clang_prefix }}${{ env.OPENVPN_ANDROID_API_LEVEL }}-clang++"
            echo "OPENVPN_AR=$NDK_BIN/llvm-ar"
            echo "OPENVPN_RANLIB=$NDK_BIN/llvm-ranlib"
            echo "OPENVPN_STRIP=$NDK_BIN/llvm-strip"
          } >> "$GITHUB_ENV"

      - name: Build OpenVPN from official sources
        env:
          ANDROID_API: ${{ env.OPENVPN_ANDROID_API_LEVEL }}
        run: |
          set -euo pipefail

          for tool in "$OPENVPN_CC" "$OPENVPN_CXX" "$OPENVPN_AR" "$OPENVPN_RANLIB" "$OPENVPN_STRIP"; do
            test -x "$tool" || { echo "::error::Tool not found: $tool"; exit 1; }
          done

          WORK="$PWD/out/build/openvpn-android"
          SRC="$WORK/src"
          BUILD="$WORK/build"
          PREFIX="$WORK/prefix"
          ARTIFACT_DIR="$PWD/out/artifacts/openvpn"
          mkdir -p "$SRC" "$BUILD" "$PREFIX" "$ARTIFACT_DIR"

          export CC="$OPENVPN_CC"
          export CXX="$OPENVPN_CXX"
          export AR="$OPENVPN_AR"
          export RANLIB="$OPENVPN_RANLIB"
          export STRIP="$OPENVPN_STRIP"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          export CPPFLAGS="-I$PREFIX/include"
          export CFLAGS="-Os -fPIC -fPIE -D__ANDROID_API__=$ANDROID_API"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-L$PREFIX/lib -pie"

          download() {
            local url="$1"
            local out="$2"
            curl -fL --retry 5 --retry-delay 3 "$url" -o "$out"
            test -s "$out" || { echo "::error::Download failed: $url"; exit 1; }
          }

          echo "=== Download official source archives ==="
          download "https://build.openvpn.net/downloads/releases/openvpn-${OPENVPN_VERSION}.tar.gz" "$SRC/openvpn.tar.gz"
          download "https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-${MBEDTLS_VERSION}/mbedtls-${MBEDTLS_VERSION}.tar.bz2" "$SRC/mbedtls.tar.bz2"
          download "https://www.oberhumer.com/opensource/lzo/download/lzo-${LZO_VERSION}.tar.gz" "$SRC/lzo.tar.gz"
          download "https://github.com/lz4/lz4/releases/download/v${LZ4_VERSION}/lz4-${LZ4_VERSION}.tar.gz" "$SRC/lz4.tar.gz"

          echo "${MBEDTLS_SHA256}  $SRC/mbedtls.tar.bz2" | sha256sum -c -

          echo "=== Build LZO ${LZO_VERSION} ==="
          tar -xzf "$SRC/lzo.tar.gz" -C "$BUILD"
          pushd "$BUILD/lzo-${LZO_VERSION}" > /dev/null
          ./configure \
            --host=${{ matrix.tor_host }} \
            --prefix="$PREFIX" \
            --enable-static \
            --disable-shared
          make -j"$(nproc)"
          make install
          popd > /dev/null

          echo "=== Build LZ4 ${LZ4_VERSION} ==="
          tar -xzf "$SRC/lz4.tar.gz" -C "$BUILD"
          pushd "$BUILD/lz4-${LZ4_VERSION}" > /dev/null
          make -j"$(nproc)" -C lib \
            CC="$CC" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            CFLAGS="$CFLAGS" \
            BUILD_SHARED=no \
            liblz4.a
          make -C lib \
            PREFIX="$PREFIX" \
            BUILD_SHARED=no \
            install
          popd > /dev/null

          echo "=== Build Mbed TLS ${MBEDTLS_VERSION} ==="
          tar -xjf "$SRC/mbedtls.tar.bz2" -C "$BUILD"
          cmake -S "$BUILD/mbedtls-${MBEDTLS_VERSION}" -B "$BUILD/mbedtls-build" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.android_abi }} \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF \
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON
          cmake --build "$BUILD/mbedtls-build" --target install --parallel "$(nproc)"

          echo "=== Build OpenVPN ${OPENVPN_VERSION} ==="
          tar -xzf "$SRC/openvpn.tar.gz" -C "$BUILD"
          pushd "$BUILD/openvpn-${OPENVPN_VERSION}" > /dev/null

          echo "=== Patch OpenVPN configure/build layout for Android ==="
          python3 - <<'PY_OPENVPN_ANDROID_PATCH'
          from pathlib import Path
          
          configure_path = Path("configure.ac")
          text = configure_path.read_text()
          marker = "Depend on libcap-ng on Linux"
          start_marker = text.find(marker)
          if start_marker < 0:
              raise SystemExit("libcap-ng block marker not found in configure.ac")
          start = text.rfind("dnl\n", 0, start_marker)
          end_marker = 'if test "${with_crypto_library}" = "openssl"; then'
          end = text.find(end_marker, start_marker)
          if start < 0 or end < 0:
              raise SystemExit("unable to locate libcap-ng block bounds in configure.ac")
          
          replacement = '''dnl
          dnl Depend on libcap-ng on Linux, except Android cross builds.  Android root
          dnl modules run as root and the NDK sysroot does not provide libcap-ng.
          dnl
          case "$host" in
          	*-*-linux*android*)
          		AC_MSG_NOTICE([Skipping libcap-ng for Android cross build])
          		;;
          	*-*-linux*)
          		PKG_CHECK_MODULES([LIBCAPNG],
          				  [libcap-ng],
          				  [],
          				  [AC_MSG_ERROR([libcap-ng package not found.
          Is the development package and pkg-config ${pkg_config_found} installed?])]
          		)
          		AC_CHECK_HEADER([sys/prctl.h],,[AC_MSG_ERROR([sys/prctl.h not found!])])
          		OPTIONAL_LIBCAPNG_CFLAGS="${LIBCAPNG_CFLAGS}"
          		OPTIONAL_LIBCAPNG_LIBS="${LIBCAPNG_LIBS}"
          		AC_DEFINE(HAVE_LIBCAPNG, 1, [Enable libcap-ng support])
          		;;
          esac
          
          '''
          configure_path.write_text(text[:start] + replacement + text[end:])
          
          # Android module packaging needs only the standalone openvpn binary.
          # The upstream src/Makefile.am still recurses into plugin and Windows helper
          # subdirectories. The bundled plugin build tries to create .so files via
          # libtool, which is not needed for this Android binary artifact.
          src_makefile = Path("src/Makefile.am")
          src_text = src_makefile.read_text()
          old_subdirs = "SUBDIRS = compat openvpn openvpnmsica openvpnserv plugins tapctl"
          new_subdirs = "SUBDIRS = compat openvpn"
          if old_subdirs not in src_text:
              raise SystemExit("OpenVPN src/Makefile.am SUBDIRS layout changed")
          src_makefile.write_text(src_text.replace(old_subdirs, new_subdirs, 1))
          PY_OPENVPN_ANDROID_PATCH
          autoreconf -fi
          
          PKG_CONFIG="pkg-config --static" ./configure \
            --host=${{ matrix.tor_host }} \
            --prefix="$PREFIX/openvpn" \
            --with-crypto-library=mbedtls \
            --enable-management \
            --disable-shared \
            --enable-static \
            --disable-plugins \
            --disable-plugin-auth-pam \
            --disable-plugin-down-root \
            --disable-dco \
            --disable-pkcs11 \
            --disable-systemd \
            --disable-debug
          make -j"$(nproc)" V=1
          cp -f src/openvpn/openvpn "$ARTIFACT_DIR/openvpn"
          popd > /dev/null

          "$STRIP" --strip-unneeded "$ARTIFACT_DIR/openvpn" || true
          chmod 755 "$ARTIFACT_DIR/openvpn"

          echo "=== Verify OpenVPN artifact ==="
          file "$ARTIFACT_DIR/openvpn"
          readelf -h "$ARTIFACT_DIR/openvpn" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/openvpn" | tee "$ARTIFACT_DIR/openvpn.dynamic.txt" || true
          if readelf -d "$ARTIFACT_DIR/openvpn" 2>/dev/null | grep -E 'NEEDED.*(libmbedtls|libmbedx509|libmbedcrypto|liblzo|liblz4|libssl|libcrypto)' >/dev/null; then
            echo "::error::OpenVPN must not depend on external crypto/compression shared libraries"
            exit 1
          fi
          strings "$ARTIFACT_DIR/openvpn" | grep -E 'OpenVPN|mbed TLS|LZO|LZ4' | head -40 || true
          ls -lh "$ARTIFACT_DIR/openvpn"

      - name: Upload OpenVPN binary
        uses: actions/upload-artifact@v7
        with:
          name: openvpn-${{ matrix.artifact_suffix }}
          path: out/artifacts/openvpn/openvpn
          retention-days: 1

  build_amneziawg:
    name: build AmneziaWG ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: false

      - name: Set up Android SDK for Go cgo
        uses: android-actions/setup-android@v3

      - name: Install Android NDK for Go cgo
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          GO_CC="$NDK_BIN/${{ matrix.clang_prefix }}24-clang"
          GO_CXX="$NDK_BIN/${{ matrix.clang_prefix }}24-clang++"
          test -x "$GO_CC" || { echo "::error::Android Go cgo compiler not found: $GO_CC"; exit 1; }
          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CC=$GO_CC"
            echo "CXX=$GO_CXX"
          } >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file \
            git \
            make

          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "AMNEZIAWG_CC=$NDK_BIN/${{ matrix.clang_prefix }}${{ env.AMNEZIAWG_ANDROID_API_LEVEL }}-clang"
            echo "AMNEZIAWG_STRIP=$NDK_BIN/llvm-strip"
          } >> "$GITHUB_ENV"

      - name: Build AmneziaWG from official sources
        env:
          ANDROID_API: ${{ env.AMNEZIAWG_ANDROID_API_LEVEL }}
        run: |
          set -euo pipefail

          test -x "$AMNEZIAWG_CC" || { echo "::error::Android C compiler not found: $AMNEZIAWG_CC"; exit 1; }
          test -x "$AMNEZIAWG_STRIP" || { echo "::error::Android strip not found: $AMNEZIAWG_STRIP"; exit 1; }
          go version
          "$AMNEZIAWG_CC" --version | head -1

          WORK="$PWD/out/build/amneziawg-android"
          SRC="$WORK/src"
          ARTIFACT_DIR="$PWD/out/artifacts/amneziawg"
          export SRC ARTIFACT_DIR
          mkdir -p "$SRC" "$ARTIFACT_DIR"

          echo "=== Fetch official AmneziaWG sources ==="
          git clone --depth 1 --branch "$AMNEZIAWG_GO_REF" https://github.com/amnezia-vpn/amneziawg-go "$SRC/amneziawg-go"
          git clone --depth 1 --branch "$AMNEZIAWG_TOOLS_REF" https://github.com/amnezia-vpn/amneziawg-tools "$SRC/amneziawg-tools"
          git -C "$SRC/amneziawg-go" rev-parse HEAD | tee "$ARTIFACT_DIR/amneziawg-go.commit"
          git -C "$SRC/amneziawg-tools" rev-parse HEAD | tee "$ARTIFACT_DIR/amneziawg-tools.commit"

          echo "=== Patch AmneziaWG UAPI socket paths for Android module runtime ==="
          grep -RInE '/var/run/(amneziawg|wireguard)|/run/(amneziawg|wireguard)' "$SRC/amneziawg-go" "$SRC/amneziawg-tools/src" || true
          python3 - <<'PYAMNEZIA'
          from pathlib import Path
          import os
          
          go_socket_dir = os.environ["AMNEZIAWG_GO_UAPI_SOCKET_DIR"]
          replacements = {
              "/var/run/amneziawg": go_socket_dir,
              "/run/amneziawg": go_socket_dir,
              "/var/run/wireguard": go_socket_dir,
              "/run/wireguard": go_socket_dir,
          }
          # amneziawg-tools keeps its UAPI path build-time controlled through RUNSTATEDIR.
          # Patch amneziawg-go to use a path relative to AMNEZIAWG_ROOT. The Android
          # runtime opens the socket below cwd, so an absolute path would be doubled
          # into .../amneziawg/data/adb/modules/... on device.
          base = Path(os.environ["SRC"]) / "amneziawg-go"
          changed = 0
          for path in base.rglob("*"):
              if not path.is_file():
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated)
                  changed += 1
          print(f"patched amneziawg-go files: {changed}")
          PYAMNEZIA
          grep -RInE "$AMNEZIAWG_GO_UAPI_SOCKET_DIR|$AMNEZIAWG_UAPI_SOCKET_DIR|$AMNEZIAWG_UAPI_RUN_DIR|/var/run/(amneziawg|wireguard)|/run/(amneziawg|wireguard)" "$SRC/amneziawg-go" "$SRC/amneziawg-tools/src" || true

          echo "=== Build amneziawg-go (${AMNEZIAWG_GO_REF}) ==="
          pushd "$SRC/amneziawg-go" > /dev/null
          GOOS=android \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm }} \
          CGO_ENABLED=${{ matrix.cgo_enabled }} \
            go build \
              -trimpath \
              -ldflags="-s -w -buildid=" \
              -o "$ARTIFACT_DIR/amneziawg-go" \
              .
          popd > /dev/null

          echo "=== Build awg (${AMNEZIAWG_TOOLS_REF}) ==="
          pushd "$SRC/amneziawg-tools/src" > /dev/null
          test -f uapi/linux/linux/wireguard.h || { echo "::error::AmneziaWG Linux UAPI header missing"; exit 1; }
          grep -q 'WGDEVICE_A_JC' uapi/linux/linux/wireguard.h || { echo "::error::AmneziaWG UAPI header does not contain AWG attributes"; exit 1; }
          export CFLAGS="-O3 -fPIE"
          export LDFLAGS="-pie"
          make \
            V=1 \
            PLATFORM=linux \
            CC="$AMNEZIAWG_CC" \
            RUNSTATEDIR="$AMNEZIAWG_UAPI_RUN_DIR" \
            WITH_WGQUICK=no \
            WITH_BASHCOMPLETION=no \
            WITH_SYSTEMDUNITS=no \
            wg
          cp -f wg "$ARTIFACT_DIR/awg"
          popd > /dev/null

          "$AMNEZIAWG_STRIP" --strip-unneeded "$ARTIFACT_DIR/awg" || true
          chmod 755 "$ARTIFACT_DIR/amneziawg-go" "$ARTIFACT_DIR/awg"

          echo "=== Verify AmneziaWG artifacts ==="
          file "$ARTIFACT_DIR/amneziawg-go" "$ARTIFACT_DIR/awg"
          readelf -h "$ARTIFACT_DIR/amneziawg-go" | grep -E 'Class:|Machine:'
          readelf -h "$ARTIFACT_DIR/awg" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/amneziawg-go" | tee "$ARTIFACT_DIR/amneziawg-go.dynamic.txt" || true
          readelf -d "$ARTIFACT_DIR/awg" | tee "$ARTIFACT_DIR/awg.dynamic.txt" || true
          strings "$ARTIFACT_DIR/amneziawg-go" > "$ARTIFACT_DIR/amneziawg-go.strings.txt"
          strings "$ARTIFACT_DIR/awg" > "$ARTIFACT_DIR/awg.strings.txt"
          grep -F "$AMNEZIAWG_GO_UAPI_SOCKET_DIR" "$ARTIFACT_DIR/amneziawg-go.strings.txt" | head -5
          grep -F "$AMNEZIAWG_UAPI_RUN_DIR" "$ARTIFACT_DIR/awg.strings.txt" | head -5
          grep -Fq "$AMNEZIAWG_GO_UAPI_SOCKET_DIR" "$ARTIFACT_DIR/amneziawg-go.strings.txt" || { echo "::error::amneziawg-go does not contain relative Android UAPI socket dir"; exit 1; }
          grep -Fq "$AMNEZIAWG_UAPI_RUN_DIR" "$ARTIFACT_DIR/awg.strings.txt" || { echo "::error::awg does not contain Android RUNSTATEDIR"; exit 1; }
          if grep -Fq "$AMNEZIAWG_UAPI_SOCKET_DIR" "$ARTIFACT_DIR/amneziawg-go.strings.txt"; then
            echo "::error::amneziawg-go still contains absolute UAPI socket dir, this breaks Android runtime path resolution"
            exit 1
          fi
          "$ARTIFACT_DIR/amneziawg-go" --version || true
          "$ARTIFACT_DIR/awg" --version || true
          ls -lh "$ARTIFACT_DIR"

      - name: Upload AmneziaWG binaries
        uses: actions/upload-artifact@v7
        with:
          name: amneziawg-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/amneziawg/amneziawg-go
            out/artifacts/amneziawg/awg
            out/artifacts/amneziawg/*.commit
            out/artifacts/amneziawg/*.dynamic.txt
          retention-days: 1

