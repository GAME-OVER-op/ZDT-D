      - name: Download mieru arm32
        uses: actions/download-artifact@v7
        with:
          name: mieru-arm32
          path: out/artifacts/mieru/arm32
      - name: Download opera-proxy arm32
        uses: actions/download-artifact@v7
        with:
          name: opera-proxy-arm32
          path: out/artifacts/opera-proxy/arm32
      - name: Download dpitunnel arm32
        uses: actions/download-artifact@v7
        with:
          name: dpitunnel-arm32
          path: out/artifacts/dpitunnel/arm32
      - name: Download torproxy arm32
        uses: actions/download-artifact@v7
        with:
          name: torproxy-arm32
          path: out/artifacts/torproxy/arm32
      - name: Download lyrebird arm32
        uses: actions/download-artifact@v7
        with:
          name: lyrebird-arm32
          path: out/artifacts/lyrebird/arm32
      - name: Download nfqws arm32
        uses: actions/download-artifact@v7
        with:
          name: nfqws-arm32
          path: out/artifacts/nfqws/arm32
      - name: Download nfqws2 arm32
        uses: actions/download-artifact@v7
        with:
          name: nfqws2-arm32
          path: out/artifacts/nfqws2/arm32
      - name: Pack Magisk module archive
        run: |
          set -euo pipefail

          MODULE_BUILD_DIR="out/module_build/module_root"
          MODULE_ZIP="out/module/zdt_module.zip"
          BINARIES="zdtd t2s openvpn amneziawg-go awg wireproxy tun2socks mihomo sing-box byedpi dnscrypt mieru opera-proxy dpitunnel-cli torproxy lyrebird nfqws nfqws2"

          require_file() {
            local path="$1"
            test -s "$path" || { echo "::error::Required artifact missing: $path"; exit 1; }
          }

          artifact_path() {
            local arch="$1"
            local bin="$2"
            case "$bin" in
              zdtd) echo "out/artifacts/zdtd/$arch/zdtd" ;;
              t2s) echo "out/artifacts/t2s/$arch/t2s" ;;
              openvpn) echo "out/artifacts/openvpn/$arch/openvpn" ;;
              amneziawg-go) echo "out/artifacts/amneziawg/$arch/amneziawg-go" ;;
              awg) echo "out/artifacts/amneziawg/$arch/awg" ;;
              wireproxy) echo "out/artifacts/wireproxy/$arch/wireproxy" ;;
              tun2socks) echo "out/artifacts/tun2socks/$arch/tun2socks" ;;
              mihomo) echo "out/artifacts/mihomo/$arch/mihomo" ;;
              sing-box) echo "out/artifacts/sing-box/$arch/sing-box" ;;
              byedpi) echo "out/artifacts/byedpi/$arch/byedpi" ;;
              dnscrypt) echo "out/artifacts/dnscrypt/$arch/dnscrypt" ;;
              mieru) echo "out/artifacts/mieru/$arch/mieru" ;;
              opera-proxy) echo "out/artifacts/opera-proxy/$arch/opera-proxy" ;;
              dpitunnel-cli) echo "out/artifacts/dpitunnel/$arch/dpitunnel-cli" ;;
              torproxy) echo "out/artifacts/torproxy/$arch/torproxy" ;;
              lyrebird) echo "out/artifacts/lyrebird/$arch/lyrebird" ;;
              nfqws) echo "out/artifacts/nfqws/$arch/nfqws" ;;
              nfqws2) echo "out/artifacts/nfqws2/$arch/nfqws2" ;;
              *) echo "::error::Unknown binary: $bin"; exit 1 ;;
            esac
          }

          rm -rf out/module_build
          mkdir -p "$MODULE_BUILD_DIR" out/module
          cp -a module_template/. "$MODULE_BUILD_DIR/"
          cp -f module.prop "$MODULE_BUILD_DIR/module.prop"

          [[ -d "$MODULE_BUILD_DIR/META-INF" ]] || { echo "::error::META-INF doesnt exist in module_template"; exit 1; }
          find "$MODULE_BUILD_DIR" -name .gitkeep -type f -delete 2>/dev/null || true
          rm -f "$MODULE_BUILD_DIR/zygisk/unloaded" 2>/dev/null || true
          rm -rf "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/prebuilt"
          mkdir -p "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/prebuilt/bin/arm64-v8a" "$MODULE_BUILD_DIR/prebuilt/bin/arm-v7a" "$MODULE_BUILD_DIR/zygisk"

          cp -f out/artifacts/zygisk/arm64/arm64-v8a.so "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so"
          cp -f out/artifacts/zygisk/arm32/armeabi-v7a.so "$MODULE_BUILD_DIR/zygisk/armeabi-v7a.so"
          chmod 644 "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so" "$MODULE_BUILD_DIR/zygisk/armeabi-v7a.so"

          echo "=== Install zapret2 Lua scripts matching the packaged nfqws2 binary ==="
          require_file "out/artifacts/nfqws2/arm64/lua/zapret-lib.lua"
          CUSTOM_LUA_DIR="$RUNNER_TEMP/zdt-custom-lua"
          rm -rf "$CUSTOM_LUA_DIR"
          mkdir -p "$CUSTOM_LUA_DIR"
          for custom_lua in zapret-sni.lua zapret-wgobfs.lua; do
            if [[ -f "$MODULE_BUILD_DIR/strategic/lua/$custom_lua" ]]; then
              cp -f "$MODULE_BUILD_DIR/strategic/lua/$custom_lua" "$CUSTOM_LUA_DIR/$custom_lua"
            fi
          done
          rm -rf "$MODULE_BUILD_DIR/strategic/lua"
          mkdir -p "$MODULE_BUILD_DIR/strategic/lua"
          cp -a out/artifacts/nfqws2/arm64/lua/. "$MODULE_BUILD_DIR/strategic/lua/"
          for custom_lua in zapret-sni.lua zapret-wgobfs.lua; do
            require_file "$CUSTOM_LUA_DIR/$custom_lua"
            cp -f "$CUSTOM_LUA_DIR/$custom_lua" "$MODULE_BUILD_DIR/strategic/lua/$custom_lua"
          done
          chmod 644 "$MODULE_BUILD_DIR/strategic/lua"/*.lua
          grep -n 'NFQWS2_COMPAT_VER_REQUIRED' "$MODULE_BUILD_DIR/strategic/lua/zapret-lib.lua" || true

          for arch in arm64 arm32; do
            case "$arch" in
              arm64) module_arch="arm64-v8a" ;;
              arm32) module_arch="arm-v7a" ;;
            esac
            for bin in $BINARIES; do
              src="$(artifact_path "$arch" "$bin")"
              require_file "$src"
              cp -f "$src" "$MODULE_BUILD_DIR/prebuilt/bin/$module_arch/$bin"
              chmod 755 "$MODULE_BUILD_DIR/prebuilt/bin/$module_arch/$bin"
            done
          done

          rm -rf "$MODULE_BUILD_DIR/verify_sum"
          mkdir -p "$MODULE_BUILD_DIR/verify_sum/prebuilt/bin" "$MODULE_BUILD_DIR/verify_sum/zygisk"
          while IFS= read -r file; do
            rel="${file#$MODULE_BUILD_DIR/}"
            mkdir -p "$MODULE_BUILD_DIR/verify_sum/$(dirname "$rel")"
            (cd "$MODULE_BUILD_DIR" && sha256sum "$rel" > "verify_sum/$rel.sha256")
          done < <(find "$MODULE_BUILD_DIR/prebuilt/bin" "$MODULE_BUILD_DIR/zygisk" -type f | sort)
          test -s "$MODULE_BUILD_DIR/verify_sum/prebuilt/bin/arm64-v8a/zdtd.sha256" || { echo "::error::arm64 zdtd verify sum missing"; exit 1; }
          test -s "$MODULE_BUILD_DIR/verify_sum/prebuilt/bin/arm-v7a/zdtd.sha256" || { echo "::error::arm32 zdtd verify sum missing"; exit 1; }
          test -s "$MODULE_BUILD_DIR/verify_sum/zygisk/arm64-v8a.so.sha256" || { echo "::error::arm64 zygisk verify sum missing"; exit 1; }
          test -s "$MODULE_BUILD_DIR/verify_sum/zygisk/armeabi-v7a.so.sha256" || { echo "::error::arm32 zygisk verify sum missing"; exit 1; }

          pushd "$MODULE_BUILD_DIR" > /dev/null
          zip -qr "../../../$MODULE_ZIP" .
          popd > /dev/null

          ZIP_ENTRIES="$(unzip -Z1 "$MODULE_ZIP" 2>/dev/null)" || { echo "::error::Unable to read raw module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'prebuilt/bin/arm64-v8a/zdtd' >/dev/null || { echo "::error::arm64 module binaries missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'prebuilt/bin/arm-v7a/zdtd' >/dev/null || { echo "::error::arm32 module binaries missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'zygisk/arm64-v8a.so' >/dev/null || { echo "::error::arm64 Zygisk binary missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'zygisk/armeabi-v7a.so' >/dev/null || { echo "::error::arm32 Zygisk binary missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'strategic/lua/zapret-lib.lua' >/dev/null || { echo "::error::zapret2 Lua library missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'strategic/lua/zapret-sni.lua' >/dev/null || { echo "::error::custom zapret-sni.lua missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'strategic/lua/zapret-wgobfs.lua' >/dev/null || { echo "::error::custom zapret-wgobfs.lua missing"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'verify.sh' >/dev/null || { echo "::error::verify.sh missing in module zip"; exit 1; }
          if printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'bin/dpi-detector' >/dev/null; then
            echo "::error::dpi-detector must not be packed into module zip; it belongs to APK assets"
            exit 1
          fi
          if printf '%s\n' "$ZIP_ENTRIES" | grep -E '(^|/)(unloaded|\.gitkeep)$' >/dev/null; then
            echo "::error::unloaded or .gitkeep leaked into module zip"
            exit 1
          fi

          RAW_MODULE_ZIP="out/module/zdt_module.raw.zip"
          cp -f "$MODULE_ZIP" "$RAW_MODULE_ZIP"
          python3 scripts/module/fake-encrypt-central-directory.py "$RAW_MODULE_ZIP" "$MODULE_ZIP"
          test -s "$MODULE_ZIP" || { echo "::error::module zip missing after central directory protection"; exit 1; }
          ls -lh "$MODULE_ZIP" "$RAW_MODULE_ZIP"

      - name: Upload module ZIP
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module/zdt_module.zip
          retention-days: 1





  build_tg_ws_proxy:
    name: build tg-ws-proxy $ matrix.abi 
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            cargo_linker_var: CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER
            cc_env: CC_aarch64_linux_android
            cxx_env: CXX_aarch64_linux_android
            ar_env: AR_aarch64_linux_android
            ranlib_env: RANLIB_aarch64_linux_android
          - abi: armeabi-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            cargo_linker_var: CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER
            cc_env: CC_armv7_linux_androideabi
            cxx_env: CXX_armv7_linux_androideabi
            ar_env: AR_armv7_linux_androideabi
            ranlib_env: RANLIB_armv7_linux_androideabi

    steps:
      - name: Checkout tg-ws-proxy-rs
        uses: actions/checkout@v6
        with:
          repository: valnesfjord/tg-ws-proxy-rs
          fetch-depth: 1

      - name: Checkout requested tg-ws-proxy ref
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          git checkout "$TG_WS_PROXY_REF"
          git rev-parse --short HEAD

      - name: Prepare Android SDK paths
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          ANDROID_HOME="$ANDROID_SDK_ROOT"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort -V | tail -1)"
          fi
          test -x "$SDKMANAGER" || { echo "::error::sdkmanager not found under $ANDROID_SDK_ROOT"; exit 1; }
          {
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "SDKMANAGER=$SDKMANAGER"
          } >> "$GITHUB_ENV"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          install_sdk_package() {
            local pkg="$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              echo "sdkmanager install $pkg: attempt $attempt/5"
              if "$SDKMANAGER" "$pkg"; then
                return 0
              fi
              rm -rf "$ANDROID_SDK_ROOT/.temp" "$ANDROID_SDK_ROOT/.downloadIntermediates" 2>/dev/null || true
              sleep $((attempt * 8))
            done
            echo "::error::Unable to install Android SDK package: $pkg"
            return 1
          }
          if [[ ! -d "$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" ]]; then
            install_sdk_package "ndk;$NDK_VERSION"
          fi
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/$ matrix.clang_target_api21 -clang"
          ANDROID_CXX="$NDK_BIN/$ matrix.clang_target_api21 -clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"
          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }
          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "$ matrix.cargo_linker_var =$ANDROID_CC"
            echo "$ matrix.cc_env =$ANDROID_CC"
            echo "$ matrix.cxx_env =$ANDROID_CXX"
            echo "$ matrix.ar_env =$ANDROID_AR"
            echo "$ matrix.ranlib_env =$ANDROID_RANLIB"
            echo "TARGET_CC=$ANDROID_CC"
            echo "TARGET_CXX=$ANDROID_CXX"
            echo "CC=$ANDROID_CC"
            echo "CXX=$ANDROID_CXX"
            echo "AR=$ANDROID_AR"
            echo "RANLIB=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF_CARGO_ANDROID
          [target.$ matrix.rust_target ]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF_CARGO_ANDROID

      - name: Build tg-ws-proxy
        run: |
          set -euo pipefail
          cargo build --release --target "$ matrix.rust_target "

      - name: Collect tg-ws-proxy
        run: |
          set -euo pipefail
          SRC="target/$ matrix.rust_target /release/tg-ws-proxy"
          DST="out/tg-ws-proxy/$ matrix.abi "
          test -s "$SRC" || { echo "::error::tg-ws-proxy artifact missing after build: $SRC"; exit 1; }
          mkdir -p "$DST"
          cp -f "$SRC" "$DST/tg-ws-proxy"
          chmod 755 "$DST/tg-ws-proxy"
          file "$DST/tg-ws-proxy"
          ls -lh "$DST/tg-ws-proxy"

      - name: Upload tg-ws-proxy binary
        uses: actions/upload-artifact@v7
        with:
          name: tg-ws-proxy-$ matrix.artifact_suffix 
          path: out/tg-ws-proxy/$ matrix.abi /tg-ws-proxy
          retention-days: 1

  package_tg_ws_proxy_asset:
    name: package tg_ws_proxy.zip
    runs-on: ubuntu-latest
    needs:
      - build_tg_ws_proxy
    if: needs.build_tg_ws_proxy.result == 'success'

    steps:
      - name: Download tg-ws-proxy arm64
        uses: actions/download-artifact@v7
        with:
          name: tg-ws-proxy-arm64
          path: out/tg-ws-proxy/arm64-v8a

      - name: Download tg-ws-proxy arm32
        uses: actions/download-artifact@v7
        with:
          name: tg-ws-proxy-arm32
          path: out/tg-ws-proxy/armeabi-v7a

      - name: Build tg_ws_proxy.zip
        run: |
          set -euo pipefail
          mkdir -p out/technical/tg_ws_proxy/arm64-v8a out/technical/tg_ws_proxy/armeabi-v7a
          cp -f out/tg-ws-proxy/arm64-v8a/tg-ws-proxy out/technical/tg_ws_proxy/arm64-v8a/tg-ws-proxy
          cp -f out/tg-ws-proxy/armeabi-v7a/tg-ws-proxy out/technical/tg_ws_proxy/armeabi-v7a/tg-ws-proxy
          chmod 755 out/technical/tg_ws_proxy/arm64-v8a/tg-ws-proxy out/technical/tg_ws_proxy/armeabi-v7a/tg-ws-proxy
          ARM64_SHA="$(sha256sum out/technical/tg_ws_proxy/arm64-v8a/tg-ws-proxy | cut -d ' ' -f1)"
          ARM32_SHA="$(sha256sum out/technical/tg_ws_proxy/armeabi-v7a/tg-ws-proxy | cut -d ' ' -f1)"
          ARM64_SIZE="$(stat -c%s out/technical/tg_ws_proxy/arm64-v8a/tg-ws-proxy)"
          ARM32_SIZE="$(stat -c%s out/technical/tg_ws_proxy/armeabi-v7a/tg-ws-proxy)"
          cat > out/technical/tg_ws_proxy/manifest.json <<EOF_MANIFEST
          {
            "name": "tg-ws-proxy",
            "version": "$TG_WS_PROXY_REF",
            "source": "https://github.com/valnesfjord/tg-ws-proxy-rs",
            "ref": "$TG_WS_PROXY_REF",
            "files": {
              "arm64-v8a/tg-ws-proxy": {
                "sha256": "$ARM64_SHA",
                "size": $ARM64_SIZE
              },
              "armeabi-v7a/tg-ws-proxy": {
                "sha256": "$ARM32_SHA",
                "size": $ARM32_SIZE
              }
            }
          }
          EOF_MANIFEST
          (cd out/technical/tg_ws_proxy && zip -9 -r ../tg_ws_proxy.zip manifest.json arm64-v8a/tg-ws-proxy armeabi-v7a/tg-ws-proxy)
          unzip -t out/technical/tg_ws_proxy.zip
          unzip -Z1 out/technical/tg_ws_proxy.zip | grep -Fx 'manifest.json'
          unzip -Z1 out/technical/tg_ws_proxy.zip | grep -Fx 'arm64-v8a/tg-ws-proxy'
          unzip -Z1 out/technical/tg_ws_proxy.zip | grep -Fx 'armeabi-v7a/tg-ws-proxy'
          ls -lh out/technical/tg_ws_proxy.zip

      - name: Upload tg_ws_proxy.zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: tg-ws-proxy-technical-asset
          path: out/technical/tg_ws_proxy.zip
