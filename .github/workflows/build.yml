          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          NDK_BIN="$TOOLCHAIN/bin"

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "NFQWS2_ANDROID_API=21"
            echo "NFQWS2_TARGET=aarch64-linux-android"
            echo "NFQWS2_TOOLCHAIN=$TOOLCHAIN"
            echo "NFQWS2_CC=$NDK_BIN/clang --target=aarch64-linux-android21"
            echo "NFQWS2_AR=$NDK_BIN/llvm-ar"
            echo "NFQWS2_RANLIB=$NDK_BIN/llvm-ranlib"
            echo "NFQWS2_STRIP=$NDK_BIN/llvm-strip"
          } >> "$GITHUB_ENV"

      - name: Build nfqws2 from latest zapret2 release tag
        run: |
          set -euo pipefail

          for tool in "$NFQWS2_TOOLCHAIN/bin/clang" "$NFQWS2_AR" "$NFQWS2_RANLIB" "$NFQWS2_STRIP"; do
            test -x "$tool" || { echo "::error::Tool not found: $tool"; exit 1; }
          done

          WORK="$PWD/out/build/nfqws2-android"
          SRC="$WORK/src"
          BUILD="$WORK/build"
          DEPS_DIR="$WORK/deps"
          ARTIFACT_DIR="$PWD/out/artifacts/nfqws2"
          mkdir -p "$SRC" "$BUILD" "$DEPS_DIR" "$ARTIFACT_DIR"

          export CC="$NFQWS2_CC"
          export AR="$NFQWS2_AR"
          export AS="$NFQWS2_CC"
          export RANLIB="$NFQWS2_RANLIB"
          export STRIP="$NFQWS2_STRIP"
          export PKG_CONFIG_PATH="$DEPS_DIR/lib/pkgconfig"

          download() {
            local url="$1"
            local out="$2"
            curl -fL --retry 5 --retry-delay 3 "$url" -o "$out"
            test -s "$out" || { echo "::error::Download failed: $url"; exit 1; }
          }

          echo "=== Resolve latest zapret2 release tag ==="
          ZAPRET2_REF="$(git ls-remote --tags --refs https://github.com/bol-van/zapret2.git 'v*' \
            | awk -F/ '{print $NF}' \
            | sort -V \
            | tail -1)"
          if [[ -z "$ZAPRET2_REF" ]]; then
            echo "::error::Unable to resolve latest zapret2 tag"
            exit 1
          fi
          echo "ZAPRET2_REF=$ZAPRET2_REF"

          echo "=== Fetch zapret2 $ZAPRET2_REF ==="
          git clone --depth 1 --branch "$ZAPRET2_REF" https://github.com/bol-van/zapret2.git "$SRC/zapret2"
          ZAPRET2_COMMIT="$(git -C "$SRC/zapret2" rev-parse HEAD)"
          echo "$ZAPRET2_REF" | tee "$ARTIFACT_DIR/zapret2.ref"
          echo "$ZAPRET2_COMMIT" | tee "$ARTIFACT_DIR/zapret2.commit"

          echo "=== Build LuaJIT for Android arm64 ==="
          LUAJIT_VER="2.1"
          LUAJIT_RELEASE="2.1-20250826"
          LUAJIT_LUAVER="5.1"
          download "https://github.com/openresty/luajit2/archive/refs/tags/v${LUAJIT_RELEASE}.tar.gz" "$SRC/luajit2.tar.gz"
          tar -xzf "$SRC/luajit2.tar.gz" -C "$BUILD"
          luajitdir="$(find "$BUILD" -maxdepth 1 -type d -name 'luajit2-*' | head -1)"
          test -d "$luajitdir" || { echo "::error::LuaJIT source directory not found"; exit 1; }
          pushd "$luajitdir" > /dev/null
          make \
            BUILDMODE=static \
            XCFLAGS="-DLUAJIT_DISABLE_FFI" \
            HOST_CC="cc" \
            CROSS= \
            CC="$NFQWS2_CC" \
            TARGET_AR="$NFQWS2_AR rcus" \
            TARGET_STRIP="$NFQWS2_STRIP" \
            TARGET_CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections" \
            TARGET_LDFLAGS="-Wl,--gc-sections -flto=auto" \
            -j"$(nproc)"
          make install PREFIX= DESTDIR="$DEPS_DIR"
          popd > /dev/null
          LJIT=1
          LCFLAGS="-I${DEPS_DIR}/include/luajit-${LUAJIT_VER}"
          LLIB="-L${DEPS_DIR}/lib -lluajit-${LUAJIT_LUAVER}"

          echo "=== Download netfilter/zlib dependencies ==="
          download "https://www.netfilter.org/pub/libnfnetlink/libnfnetlink-1.0.2.tar.bz2" "$SRC/libnfnetlink.tar.bz2"
          download "https://www.netfilter.org/pub/libmnl/libmnl-1.0.5.tar.bz2" "$SRC/libmnl.tar.bz2"
          download "https://www.netfilter.org/pub/libnetfilter_queue/libnetfilter_queue-1.0.5.tar.bz2" "$SRC/libnetfilter_queue.tar.bz2"

          ZLIB_REF="$(curl -fsSL --retry 5 --retry-delay 3 https://api.github.com/repos/madler/zlib/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          test -n "$ZLIB_REF" || { echo "::error::Unable to resolve zlib latest tag"; exit 1; }
          download "https://github.com/madler/zlib/archive/refs/tags/${ZLIB_REF}.tar.gz" "$SRC/zlib.tar.gz"

          tar -xjf "$SRC/libnfnetlink.tar.bz2" -C "$BUILD"
          tar -xjf "$SRC/libmnl.tar.bz2" -C "$BUILD"
          tar -xjf "$SRC/libnetfilter_queue.tar.bz2" -C "$BUILD"
          tar -xzf "$SRC/zlib.tar.gz" -C "$BUILD"

          echo "=== Patch libnetfilter_queue for Android ==="
          patch -p1 -d "$BUILD"/libnetfilter_queue-* -i "$SRC/zapret2/.github/workflows/libnetfilter_queue-android.patch"

          echo "=== Build netfilter dependencies ==="
          for lib in libmnl libnfnetlink libnetfilter_queue; do
            libdir="$(find "$BUILD" -maxdepth 1 -type d -name "${lib}-*" | head -1)"
            test -d "$libdir" || { echo "::error::Source directory not found for $lib"; exit 1; }
            pushd "$libdir" > /dev/null
            CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections -Wno-implicit-function-declaration" \
            LDFLAGS="-Wl,--gc-sections -flto=auto" \
              ./configure \
                --prefix= \
                --host="$NFQWS2_TARGET" \
                --enable-static \
                --disable-shared \
                --disable-dependency-tracking
            make -j"$(nproc)"
            make install -j"$(nproc)" DESTDIR="$DEPS_DIR"
            popd > /dev/null
            sed -i "s|^prefix=.*|prefix=$DEPS_DIR|g" "$DEPS_DIR/lib/pkgconfig/$lib.pc"
          done

          echo "=== Build zlib $ZLIB_REF ==="
          zlibdir="$(find "$BUILD" -maxdepth 1 -type d -name 'zlib-*' | head -1)"
          test -d "$zlibdir" || { echo "::error::zlib source directory not found"; exit 1; }
          pushd "$zlibdir" > /dev/null
          CFLAGS="-Oz -flto=auto -ffunction-sections -fdata-sections" ./configure --prefix= --static
          make -j"$(nproc)"
          make install -j"$(nproc)" DESTDIR="$DEPS_DIR"
          popd > /dev/null

          echo "=== Build nfqws2 from zapret2 $ZAPRET2_REF ==="
          NFQWS2_VERSION_CFLAGS="-DZAPRET_GH_VER=\\\"$ZAPRET2_REF\\\" -DZAPRET_GH_HASH=\\\"$ZAPRET2_COMMIT\\\""
          CFLAGS="$NFQWS2_VERSION_CFLAGS -I$DEPS_DIR/include -Oz -flto=auto -ffunction-sections -fdata-sections" \
          LDFLAGS="-L$DEPS_DIR/lib -Wl,--gc-sections -flto=auto -Wl,-z,max-page-size=16384" \
            make -C "$SRC/zapret2/nfq2" \
              LUA_JIT="$LJIT" \
              LUA_CFLAGS="$LCFLAGS" \
              LUA_LIB="$LLIB" \
              -j"$(nproc)" \
              android

          cp -f "$SRC/zapret2/nfq2/nfqws2" "$ARTIFACT_DIR/nfqws2"
          chmod 755 "$ARTIFACT_DIR/nfqws2"

          echo "=== Clean and verify nfqws2 ELF ==="
          CLEANER_TAG="$(curl -fsSL --retry 5 --retry-delay 3 https://api.github.com/repos/termux/termux-elf-cleaner/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          if [[ -n "$CLEANER_TAG" ]]; then
            download "https://github.com/termux/termux-elf-cleaner/releases/download/${CLEANER_TAG}/termux-elf-cleaner" "$WORK/termux-elf-cleaner"
            chmod +x "$WORK/termux-elf-cleaner"
            "$WORK/termux-elf-cleaner" --api-level "$NFQWS2_ANDROID_API" "$ARTIFACT_DIR/nfqws2"
          fi
          "$NFQWS2_STRIP" --strip-unneeded "$ARTIFACT_DIR/nfqws2" || true

          cat > "$ARTIFACT_DIR/nfqws2.version" <<EOF_NFQWS2_VERSION
          source=https://github.com/bol-van/zapret2
          zapret2_ref=$ZAPRET2_REF
          zapret2_commit=$ZAPRET2_COMMIT
          binary=nfqws2
          target=android-arm64
          android_api=$NFQWS2_ANDROID_API
          luajit_release=$LUAJIT_RELEASE
          zlib_ref=$ZLIB_REF
          libmnl_version=1.0.5
          libnfnetlink_version=1.0.2
          libnetfilter_queue_version=1.0.5
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_NFQWS2_VERSION

          file "$ARTIFACT_DIR/nfqws2"
          readelf -h "$ARTIFACT_DIR/nfqws2" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/nfqws2" | tee "$ARTIFACT_DIR/nfqws2.dynamic.txt" || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/nfqws2.version"

      - name: Upload nfqws2 binary
        uses: actions/upload-artifact@v7
        with:
          name: nfqws2-arm64
          path: |
            out/artifacts/nfqws2/nfqws2
            out/artifacts/nfqws2/nfqws2.version
            out/artifacts/nfqws2/zapret2.ref
            out/artifacts/nfqws2/zapret2.commit
            out/artifacts/nfqws2/nfqws2.dynamic.txt
          retention-days: 1

  module_binaries_ready:
    name: 2 Module binaries ready (OpenVPN + AmneziaWG + wireproxy + nfqws + nfqws2)
    runs-on: ubuntu-latest
    needs:
      - build_openvpn
      - build_amneziawg
      - build_wireproxy
      - build_nfqws
      - build_nfqws2
    if: >-
      needs.build_openvpn.result == 'success' &&
      needs.build_amneziawg.result == 'success' &&
      needs.build_wireproxy.result == 'success' &&
      needs.build_nfqws.result == 'success' &&
      needs.build_nfqws2.result == 'success'

    steps:
      - name: Mark module binaries ready
        run: echo "External module binary artifacts are ready for module packaging"

  build_zygisk:
    name: 3 Zygisk / compile module
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Build Zygisk arm64-v8a
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_ROOT }}
          NDK_ROOT: ${{ env.NDK_ROOT }}
          ANDROID_API_LEVEL: 24
        run: |
          set -euo pipefail
          mkdir -p out/zygisk
          ./zygisk/build.sh out/zygisk/arm64-v8a.so
          file out/zygisk/arm64-v8a.so
          test -s out/zygisk/arm64-v8a.so
          readelf -Ws out/zygisk/arm64-v8a.so | grep -q ' zygisk_module_entry$'
          if readelf -d out/zygisk/arm64-v8a.so | grep -E 'NEEDED.*(libc\+\+|libstdc\+\+)' >/dev/null 2>&1; then
            echo "::error::Zygisk binary must not depend on C++ STL runtime"
            exit 1
          fi

      - name: Upload Zygisk binary
        uses: actions/upload-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk/arm64-v8a.so
          retention-days: 1

  module_zygisk_ready:
    name: 3 Module Zygisk ready
    runs-on: ubuntu-latest
    needs:
      - build_zygisk
    if: needs.build_zygisk.result == 'success'

    steps:
      - name: Mark Zygisk binary ready
        run: echo "Zygisk artifact is ready for module packaging"

  pack_module:
    name: 5 Pack module ZIP
    runs-on: ubuntu-latest
    needs:
      - module_core_ready
      - module_binaries_ready
      - module_zygisk_ready
    if: >-
      needs.module_core_ready.result == 'success' &&
      needs.module_binaries_ready.result == 'success' &&
      needs.module_zygisk_ready.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download zdtd binary
        uses: actions/download-artifact@v7
        with:
          name: zdtd-arm64
          path: out/artifacts/zdtd

      - name: Download T2S binary
        uses: actions/download-artifact@v7
        with:
          name: t2s-arm64
          path: out/artifacts/t2s

      - name: Download Zygisk binary
        uses: actions/download-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk

      - name: Download OpenVPN binary
        uses: actions/download-artifact@v7
        with:
          name: openvpn-arm64
          path: out/artifacts/openvpn

      - name: Download AmneziaWG binaries
        uses: actions/download-artifact@v7
        with:
          name: amneziawg-arm64
          path: out/artifacts/amneziawg

      - name: Download wireproxy binary
        uses: actions/download-artifact@v7
        with:
          name: wireproxy-arm64
          path: out/artifacts/wireproxy

      - name: Download nfqws binary
        uses: actions/download-artifact@v7
        with:
          name: nfqws-arm64
          path: out/artifacts/nfqws

      - name: Download nfqws2 binary
        uses: actions/download-artifact@v7
        with:
          name: nfqws2-arm64
          path: out/artifacts/nfqws2

      - name: Check prebuilt binaries
        run: |
          REQUIRED=(byedpi dnscrypt dpitunnel-cli opera-proxy sing-box mieru torproxy lyrebird tun2socks mihomo)
          MISSING=()
          for bin in "${REQUIRED[@]}"; do
            [[ -f "prebuilt/bin/arm64-v8a/$bin" ]] || MISSING+=("$bin")
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Binaries doesn't exist: ${MISSING[*]}"
            exit 1
          fi
          echo "All binaries found"

      - name: Pack Magisk module archive
        run: |
          set -euo pipefail

          MODULE_BUILD_DIR="out/module_build/module_root"
          MODULE_ZIP="out/module/zdt_module.zip"
          PREBUILT="prebuilt/bin/arm64-v8a"
          ZDTD_BIN="out/artifacts/zdtd/zdtd"
          T2S_BIN="out/artifacts/t2s/t2s"
          ZYGISK_SO="out/zygisk/arm64-v8a.so"
          OPENVPN_BIN="out/artifacts/openvpn/openvpn"
          AMNEZIAWG_GO_BIN="out/artifacts/amneziawg/amneziawg-go"
          AWG_BIN="out/artifacts/amneziawg/awg"
          WIREPROXY_BIN="out/artifacts/wireproxy/wireproxy"
          NFQWS_BIN="out/artifacts/nfqws/nfqws"
          NFQWS2_BIN="out/artifacts/nfqws2/nfqws2"

          test -s "$ZDTD_BIN" || { echo "::error::zdtd artifact missing: $ZDTD_BIN"; exit 1; }
          test -s "$T2S_BIN" || { echo "::error::t2s artifact missing: $T2S_BIN"; exit 1; }
          test -s "$ZYGISK_SO" || { echo "::error::Zygisk artifact missing: $ZYGISK_SO"; exit 1; }
          test -s "$OPENVPN_BIN" || { echo "::error::OpenVPN artifact missing: $OPENVPN_BIN"; exit 1; }
          test -s "$AMNEZIAWG_GO_BIN" || { echo "::error::amneziawg-go artifact missing: $AMNEZIAWG_GO_BIN"; exit 1; }
          test -s "$AWG_BIN" || { echo "::error::awg artifact missing: $AWG_BIN"; exit 1; }
          test -s "$WIREPROXY_BIN" || { echo "::error::wireproxy artifact missing: $WIREPROXY_BIN"; exit 1; }
          test -s "$NFQWS_BIN" || { echo "::error::nfqws artifact missing: $NFQWS_BIN"; exit 1; }
          test -s "$NFQWS2_BIN" || { echo "::error::nfqws2 artifact missing: $NFQWS2_BIN"; exit 1; }

          rm -rf out/module_build
          mkdir -p "$MODULE_BUILD_DIR" out/module

          cp -a module_template/. "$MODULE_BUILD_DIR/"
          cp -f module.prop "$MODULE_BUILD_DIR/module.prop"

          [[ -d "$MODULE_BUILD_DIR/META-INF" ]] || { echo "::error::META-INF doesnt exist in module_template"; exit 1; }
          find "$MODULE_BUILD_DIR" -name .gitkeep -type f -delete 2>/dev/null || true
          rm -f "$MODULE_BUILD_DIR/zygisk/unloaded" 2>/dev/null || true

          mkdir -p "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/zygisk"
          cp -f "$ZYGISK_SO" "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so" && chmod 644 "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so"

          cp -f "$ZDTD_BIN" "$MODULE_BUILD_DIR/bin/zdtd" && chmod 755 "$MODULE_BUILD_DIR/bin/zdtd"
          cp -f "$T2S_BIN"  "$MODULE_BUILD_DIR/bin/t2s"  && chmod 755 "$MODULE_BUILD_DIR/bin/t2s"
          cp -f "$OPENVPN_BIN" "$MODULE_BUILD_DIR/bin/openvpn" && chmod 755 "$MODULE_BUILD_DIR/bin/openvpn"
          cp -f "$AMNEZIAWG_GO_BIN" "$MODULE_BUILD_DIR/bin/amneziawg-go" && chmod 755 "$MODULE_BUILD_DIR/bin/amneziawg-go"
          cp -f "$AWG_BIN" "$MODULE_BUILD_DIR/bin/awg" && chmod 755 "$MODULE_BUILD_DIR/bin/awg"
          cp -f "$WIREPROXY_BIN" "$MODULE_BUILD_DIR/bin/wireproxy" && chmod 755 "$MODULE_BUILD_DIR/bin/wireproxy"
          cp -f "$NFQWS_BIN" "$MODULE_BUILD_DIR/bin/nfqws" && chmod 755 "$MODULE_BUILD_DIR/bin/nfqws"
          cp -f "$NFQWS2_BIN" "$MODULE_BUILD_DIR/bin/nfqws2" && chmod 755 "$MODULE_BUILD_DIR/bin/nfqws2"
          for bin in byedpi dnscrypt dpitunnel-cli opera-proxy sing-box mieru torproxy lyrebird tun2socks mihomo; do
            cp -f "$PREBUILT/$bin" "$MODULE_BUILD_DIR/bin/$bin" && chmod 755 "$MODULE_BUILD_DIR/bin/$bin"
          done

          rm -rf "$MODULE_BUILD_DIR/verify_sum"
          mkdir -p "$MODULE_BUILD_DIR/verify_sum/bin" "$MODULE_BUILD_DIR/verify_sum/zygisk"
          while IFS= read -r file; do
            rel="${file#$MODULE_BUILD_DIR/}"
            mkdir -p "$MODULE_BUILD_DIR/verify_sum/$(dirname "$rel")"
            (cd "$MODULE_BUILD_DIR" && sha256sum "$rel" > "verify_sum/$rel.sha256")
          done < <(find "$MODULE_BUILD_DIR/bin" -maxdepth 1 -type f | sort)
          (cd "$MODULE_BUILD_DIR" && sha256sum 'zygisk/arm64-v8a.so' > 'verify_sum/zygisk/arm64-v8a.so.sha256')
          test -s "$MODULE_BUILD_DIR/verify_sum/bin/zdtd.sha256" || { echo "::error::verify_sum/bin/zdtd.sha256 missing"; exit 1; }
          test -s "$MODULE_BUILD_DIR/verify_sum/zygisk/arm64-v8a.so.sha256" || { echo "::error::verify_sum/zygisk/arm64-v8a.so.sha256 missing"; exit 1; }

          pushd "$MODULE_BUILD_DIR" > /dev/null
          zip -qr "../../../$MODULE_ZIP" .
          popd > /dev/null

          ZIP_ENTRIES="$(unzip -Z1 "$MODULE_ZIP" 2>/dev/null)" || { echo "::error::Unable to read raw module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'zygisk/arm64-v8a.so' >/dev/null || { echo "::error::Zygisk binary missing in module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'verify.sh' >/dev/null || { echo "::error::verify.sh missing in module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'verify_sum/zygisk/arm64-v8a.so.sha256' >/dev/null || { echo "::error::zygisk verify_sum missing in module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'verify_sum/bin/zdtd.sha256' >/dev/null || { echo "::error::zdtd verify_sum missing in module zip"; exit 1; }
          if printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'bin/dpi-detector' >/dev/null; then
            echo "::error::dpi-detector must not be packed into module zip; it belongs to APK assets"
            exit 1
          fi
          if printf '%s\n' "$ZIP_ENTRIES" | grep -E '(^|/)(unloaded|\.gitkeep)$' >/dev/null; then
            echo "::error::unloaded or .gitkeep leaked into module zip"
            exit 1
          fi

          RAW_MODULE_ZIP="out/module/zdt_module.raw.zip"
          cp -f "$MODULE_ZIP" "$RAW_MODULE_ZIP"
          python3 scripts/module/fake-encrypt-central-directory.py "$RAW_MODULE_ZIP" "$MODULE_ZIP"
          python3 scripts/module/fake-encrypt-central-directory.py --check "$MODULE_ZIP"

          echo "Protected module ZIP generated with fake encrypted Central Directory"
          ls -lh "$MODULE_ZIP"

      - name: Upload module archive
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module/zdt_module.zip
          retention-days: 1

  build_dpi_detector:
    name: 4 APK tool / build dpi-detector
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android21-clang"
          ANDROID_CXX="$NDK_BIN/aarch64-linux-android21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF2
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF2

      - name: Cache Cargo registry and dpi-detector target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-dpi-detector-aarch64-linux-android-${{ hashFiles('rust/Cargo.lock', 'rust/dpi-detector/Cargo.toml') }}
          restore-keys: |
            cargo-dpi-detector-aarch64-linux-android-
            cargo-aarch64-linux-android-

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ env.CARGO_BUILD_TARGET }}'
          cargo -V
          rustc -V

      - name: Build dpi-detector
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/dpi-detector/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"

      - name: Collect dpi-detector
        run: |
          set -euo pipefail
          SRC="rust/target/${{ env.CARGO_BUILD_TARGET }}/${{ env.CARGO_PROFILE }}/dpi-detector"
          DST="out/artifacts/dpi-detector"
          test -s "$SRC" || { echo "::error::dpi-detector artifact missing after build: $SRC"; exit 1; }
          mkdir -p "$DST"
          cp -f "$SRC" "$DST/dpi-detector"
          chmod 755 "$DST/dpi-detector"
          ls -lh "$DST/dpi-detector"

      - name: Upload dpi-detector binary
        uses: actions/upload-artifact@v7
        with:
          name: dpi-detector-arm64
          path: out/artifacts/dpi-detector/dpi-detector
          retention-days: 1

