  apk_tools_ready:
    name: 4 APK tools ready (dpi-detector + nfqws-tester + BusyBox)
    runs-on: ubuntu-latest
    needs:
      - build_dpi_detector
      - build_nfqws_tester
      - build_busybox
    if: >-
      needs.build_dpi_detector.result == 'success' &&
      needs.build_nfqws_tester.result == 'success' &&
      needs.build_busybox.result == 'success'

    steps:
      - name: Mark APK tools ready
        run: echo "APK tool artifacts are ready for APK packaging"

  build_apk:
    name: 6 Build APK with module ZIP
    runs-on: ubuntu-latest
    needs:
      - pack_module
      - apk_tools_ready
    if: >-
      needs.pack_module.result == 'success' &&
      needs.apk_tools_ready.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}" \
            "ndk;27.2.12479018"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Download module archive
        uses: actions/download-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module

      - name: Download dpi-detector binary
        uses: actions/download-artifact@v7
        with:
          name: dpi-detector-arm64
          path: out/artifacts/dpi-detector

      - name: Download nfqws-tester binary
        uses: actions/download-artifact@v7
        with:
          name: nfqws-tester-arm64
          path: out/artifacts/nfqws-tester

      - name: Download BusyBox binary
        uses: actions/download-artifact@v7
        with:
          name: busybox-arm64
          path: prebuilt/bin/arm64-v8a

      - name: Verify BusyBox artifact
        run: |
          set -euo pipefail
          test -s prebuilt/bin/arm64-v8a/busybox
          chmod 755 prebuilt/bin/arm64-v8a/busybox
          ls -lh prebuilt/bin/arm64-v8a/busybox

      - name: Locate Android project root
        run: |
          SETTINGS=$(find . -maxdepth 4 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            | grep -v '/build/' | sort | head -1)
          if [[ -z "$SETTINGS" ]]; then
            echo "::error::settings.gradle dont found:"
            find . -maxdepth 4 -name '*.gradle*' | sort
            exit 1
          fi
          GRADLE_PROJECT_DIR=$(dirname "$SETTINGS")
          echo "GRADLE_PROJECT_DIR=$GRADLE_PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project root: $GRADLE_PROJECT_DIR"
          test -s out/module/zdt_module.zip || { echo "::error::Downloaded module zip is missing"; exit 1; }

      - name: Write local.properties & restore signing keystore
        env:
          ZDT_KEYSTORE_BASE64: ${{ secrets.ZDT_KEYSTORE_BASE64 }}
          ZDT_KEYSTORE_PASSWORD: ${{ secrets.ZDT_KEYSTORE_PASSWORD }}
          ZDT_KEY_ALIAS: ${{ secrets.ZDT_KEY_ALIAS }}
          ZDT_KEY_PASSWORD: ${{ secrets.ZDT_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$GRADLE_PROJECT_DIR/local.properties"

          for name in ZDT_KEYSTORE_BASE64 ZDT_KEYSTORE_PASSWORD ZDT_KEY_ALIAS ZDT_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name GitHub Actions secret is missing or empty"
              exit 1
            fi
          done

          KEYSTORE_PATH="$(pwd)/keystores/zdt-debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"

          printf '%s' "$ZDT_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ZDT_KEYSTORE_PASSWORD" \
            -alias "$ZDT_KEY_ALIAS" \
            >/dev/null

          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ZDT_KEYSTORE_PASSWORD"
            echo "keyAlias=$ZDT_KEY_ALIAS"
            echo "keyPassword=$ZDT_KEY_PASSWORD"
          } > "$GRADLE_PROJECT_DIR/keystore.properties"

      - name: Prepare dpi-detector APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/dpi-detector/dpi-detector"
          DST="application/app/build/generated/zdt-assets/main/dpi-detector/arm64-v8a/dpi-detector"
          test -s "$SRC" || { echo "::error::dpi-detector artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Prepare nfqws_tester APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/nfqws-tester/nfqws-tester"
          DST="application/app/build/generated/zdt-assets/main/nfqws-tester/arm64-v8a/nfqws_tester"
          test -s "$SRC" || { echo "::error::nfqws_tester artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Build APK assemble${{ env.BUILD_TYPE }}
        working-directory: ${{ env.GRADLE_PROJECT_DIR }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          gradle \
            --no-daemon \
            --max-workers=$(nproc) \
            "-PzdtCompileSdk=${{ env.ZDT_COMPILE_SDK }}" \
            "assemble${{ env.BUILD_TYPE }}"

      - name: Collect final artifacts
        run: |
          set -euo pipefail
          mkdir -p out/dist

          APK=$(find "$GRADLE_PROJECT_DIR" -path '*/build/outputs/apk/*.apk' -type f | sort | tail -1)
          [[ -n "$APK" ]] || { echo "::error::APK does not exist"; exit 1; }

          APK_ENTRIES="$(unzip -Z1 "$APK" 2>/dev/null)" || { echo "::error::Unable to read APK: $APK"; exit 1; }
          if ! printf '%s\n' "$APK_ENTRIES" | grep -Fx 'AndroidManifest.xml' >/dev/null; then
            echo "::error::Gradle output is not an installable APK or AndroidManifest.xml is missing: $APK"
            printf '%s\n' "$APK_ENTRIES" | head -80 || true
            exit 1
          fi
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/dpi-detector/arm64-v8a/dpi-detector' >/dev/null || { echo "::error::dpi-detector APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/nfqws-tester/arm64-v8a/nfqws_tester' >/dev/null || { echo "::error::nfqws_tester APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/busybox/busybox-arm64' >/dev/null || { echo "::error::bundled BusyBox APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/busybox/busybox-arm64.sha256' >/dev/null || { echo "::error::bundled BusyBox SHA-256 APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/busybox/busybox-arm64.source' >/dev/null || { echo "::error::bundled BusyBox source APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/busybox/zdt_module.sha256' >/dev/null || { echo "::error::module SHA-256 APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/busybox/zdt_module.cache' >/dev/null || { echo "::error::module cache APK asset missing"; exit 1; }

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}/apksigner"
          [[ -x "$APKSIGNER" ]] || { echo "::error::apksigner not found: $APKSIGNER"; exit 1; }
          "$APKSIGNER" verify --verbose "$APK"

          cp -f "$APK" out/dist/app-release.apk
          cp -f out/module/zdt_module.zip out/dist/zdt_module.zip

          ls -lh out/dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-apk
          path: out/dist/app-release.apk
          retention-days: 30

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-final
          path: out/dist/zdt_module.zip
          retention-days: 30

  publish_service:
    name: Publish service build
    runs-on: ubuntu-latest
    needs:
      - build_gate
      - build_apk
    if: github.ref == 'refs/heads/main' && needs.build_apk.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: zdt-apk
          path: out/dist

      - name: Publish service and stable releases
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_START_TS: ${{ needs.build_gate.outputs.build_start_ts }}
        run: |
          set -euo pipefail

          SERVICE_TAG="service-build"
          SERVICE_TITLE="ZDT-D Service Build"
          APK_SOURCE="out/dist/app-release.apk"
          SERVICE_APK="out/dist/ZDT-D-service-build.apk"
          STABLE_ASSET_SPEC="${APK_SOURCE}#app-release.apk"

          test -s "$APK_SOURCE" || { echo "::error::APK does not exist: $APK_SOURCE"; exit 1; }
          cp -f "$APK_SOURCE" "$SERVICE_APK"

          VERSION_CODE="$(grep -m1 '^versionCode=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')"
          VERSION_NAME="$(grep -m1 '^version=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')"

          if [[ -z "$VERSION_CODE" || ! "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Numeric versionCode not found in module.prop"
            exit 1
          fi
          if [[ -z "$VERSION_NAME" ]]; then
            echo "::error::version not found in module.prop"
            exit 1
          fi

          BUILD_END_TS="$(date +%s)"
          BUILD_START_TS="${BUILD_START_TS:-$BUILD_END_TS}"
          BUILD_DURATION_SEC=$((BUILD_END_TS - BUILD_START_TS))
          BUILD_DURATION="$(printf '%02d:%02d:%02d' $((BUILD_DURATION_SEC / 3600)) $(((BUILD_DURATION_SEC % 3600) / 60)) $((BUILD_DURATION_SEC % 60)))"
          BUILD_TIME_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          APK_SIZE_BYTES="$(stat -c%s "$APK_SOURCE")"
          APK_SIZE_HUMAN="$(numfmt --to=iec --suffix=B --format='%.2f' "$APK_SIZE_BYTES")"

          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          BUILD_TYPE="${{ env.BUILD_TYPE }}"
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"

          git fetch --tags --force >/dev/null 2>&1 || true

          parse_version_code_from_body() {
            sed -nE 's/^\|[[:space:]]*(Version code|Код версии)[[:space:]]*\|[[:space:]]*`?([0-9]+)`?[[:space:]]*\|[[:space:]]*$/\2/p' | head -1
          }

          make_commit_list() {
            local from_sha="$1"
            local to_sha="$2"
            local max_items="${3:-50}"
            local total="0"
            local list=""

            if [[ -n "$from_sha" && "$from_sha" != "$to_sha" ]]; then
              local range="${from_sha}..${to_sha}"
              total="$(git rev-list --count "$range" 2>/dev/null || echo 0)"
              if [[ "$max_items" =~ ^[0-9]+$ && "$max_items" -gt 0 ]]; then
                list="$(git log --no-merges --pretty=format:'- %s (`%h`)' -n "$max_items" "$range" 2>/dev/null || true)"
              else
                list="$(git log --no-merges --pretty=format:'- %s (`%h`)' "$range" 2>/dev/null || true)"
              fi
            else
              total="0"
              list="- No changes after the latest stable release."
            fi

            if [[ -z "$list" ]]; then
              list="- No commit messages found."
            fi
            if [[ "$max_items" =~ ^[0-9]+$ && "$max_items" -gt 0 && "$total" =~ ^[0-9]+$ && "$total" -gt "$max_items" ]]; then
              list="${list}"$'\n'"- ...and $((total - max_items)) more commits."
            fi
            printf '%s\n' "$list"
          }

          compare_url_for_range() {
            local from_sha="$1"
            local to_sha="$2"
            if [[ -n "$from_sha" && "$from_sha" != "$to_sha" ]]; then
              printf '%s/compare/%s...%s\n' "$REPO_URL" "$from_sha" "$to_sha"
            else
              printf '%s/commit/%s\n' "$REPO_URL" "$to_sha"
            fi
          }

          latest_stable_tag() {
            git tag -l 'V[0-9]*.[0-9]*.0' | sed 's/^V//' | sort -V | tail -n1 | sed 's/^/V/' || true
          }

          generate_service_ai_summary() {
            local commit_file="$1"
            local output_file="$2"
            local latest_tag="$3"

            if [[ ! -s "$commit_file" ]]; then
              printf '%s\n' "AI summary is unavailable: commit list is empty." > "$output_file"
              return 0
            fi

            cat > service_ai_prompt.txt <<EOF_AI_PROMPT
          You are preparing a short release comment for the ZDT-D Android project.
          Write in English.
          Be concise: 3-6 bullet points maximum.
          Summarize the practical changes since the baseline release.
          Do not invent features. Use only the commit list below.
          Mention the baseline release: ${latest_tag:-none}.
          
          Version: ${VERSION_NAME}
          Version code: ${VERSION_CODE}
          Commit: ${SHORT_SHA}
          
          Commit list:
          $(cat "$commit_file")
          EOF_AI_PROMPT

            python3 - <<'PY_AI_PAYLOAD' > service_ai_payload.json
          import json
          import os
          from pathlib import Path
          prompt = Path('service_ai_prompt.txt').read_text(encoding='utf-8')
          payload = {
              "model": os.environ.get("GITHUB_MODELS_MODEL", "openai/gpt-4o"),
              "messages": [
                  {"role": "system", "content": "You write concise release summaries for Android/Rust networking tools."},
                  {"role": "user", "content": prompt},
              ],
              "temperature": 0.2,
              "max_tokens": 450,
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY_AI_PAYLOAD

            if curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @service_ai_payload.json \
              https://models.github.ai/inference/chat/completions > service_ai_response.json; then
              python3 - <<'PY_AI_RESPONSE' > "$output_file" || true
          import json
          from pathlib import Path
          try:
              data = json.loads(Path('service_ai_response.json').read_text(encoding='utf-8'))
              text = data.get('choices', [{}])[0].get('message', {}).get('content', '').strip()
              print(text or 'AI summary is unavailable: empty response.')
          except Exception as exc:
              print(f'AI summary is unavailable: {exc}')
          PY_AI_RESPONSE
            else
              printf '%s\n' "AI summary is unavailable for this run. See the workflow summary for technical details." > "$output_file"
            fi
          }

          upload_asset_with_retry() {
            local tag="$1"
            local file_spec="$2"
            local asset_name="$3"
            local attempt=1
            local max_attempts=5
            UPLOAD_MODE="clobber"
            UPLOAD_ATTEMPTS="0"

            while [[ "$attempt" -le "$max_attempts" ]]; do
              echo "Upload $asset_name to $tag with --clobber: attempt $attempt/$max_attempts"
              if gh release upload "$tag" "$file_spec" --clobber; then
                UPLOAD_MODE="clobber"
                UPLOAD_ATTEMPTS="$attempt"
                return 0
              fi
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep $((attempt * 5))
              fi
              attempt=$((attempt + 1))
            done

            echo "::warning::Upload with --clobber failed for $asset_name on $tag. Trying delete+upload fallback."
            local asset_id=""
            asset_id="$(gh release view "$tag" --json assets --jq ".assets[] | select(.name==\"${asset_name}\") | .id" | head -n1 || true)"
            if [[ -n "$asset_id" ]]; then
              gh api -X DELETE "repos/${{ github.repository }}/releases/assets/$asset_id"
              sleep 3
            fi

            attempt=1
            while [[ "$attempt" -le "$max_attempts" ]]; do
              echo "Fallback upload $asset_name to $tag: attempt $attempt/$max_attempts"
              if gh release upload "$tag" "$file_spec"; then
                UPLOAD_MODE="delete+upload"
                UPLOAD_ATTEMPTS="$attempt"
                return 0
              fi
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep $((attempt * 5))
              fi
              attempt=$((attempt + 1))
            done

            echo "::error::Failed to upload $asset_name to $tag after retries and fallback"
            return 1
          }

          version_code_matches_version=false
          stable_version_shape=false
          code_min=""
          code_max=""
          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.0$ ]]; then
            stable_version_shape=true
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            code_prefix="${major}${minor}"
            code_min=$((code_prefix * 1000))
            code_max=$((code_min + 999))
            if (( VERSION_CODE >= code_min && VERSION_CODE <= code_max )); then
              version_code_matches_version=true
            fi
          fi

          SERVICE_RELEASE_EXISTS=false
          if gh release view "$SERVICE_TAG" >/dev/null 2>&1; then
            SERVICE_RELEASE_EXISTS=true
          fi

          LATEST_STABLE_TAG="$(latest_stable_tag)"
          LATEST_STABLE_SHA=""
          if [[ -n "$LATEST_STABLE_TAG" ]] && git rev-parse -q --verify "refs/tags/${LATEST_STABLE_TAG}" >/dev/null 2>&1; then
            LATEST_STABLE_SHA="$(git rev-list -n 1 "$LATEST_STABLE_TAG" 2>/dev/null || true)"
          fi

          SERVICE_COMPARE_URL="$(compare_url_for_range "$LATEST_STABLE_SHA" "$FULL_SHA")"
          SERVICE_COMMIT_LIST="$(make_commit_list "$LATEST_STABLE_SHA" "$FULL_SHA" 0)"
          printf '%s\n' "$SERVICE_COMMIT_LIST" > service_commit_list.txt
          generate_service_ai_summary service_commit_list.txt service_ai_summary.md "$LATEST_STABLE_TAG"
          SERVICE_AI_SUMMARY="$(cat service_ai_summary.md)"

          cat > service_release_notes.md <<EOF_SERVICE_NOTES
          # ZDT-D Service Build

          This is an automatic service build of ZDT-D.

          The service build is updated after every successful workflow run and always contains the APK from the latest successful build.

          > This release is a technical prerelease and is not considered a stable version release.

          ## AI summary

          ${SERVICE_AI_SUMMARY}

          ## Build information

          | Field | Value |
          |---|---|
          | Version | \`${VERSION_NAME}\` |
          | Version code | \`${VERSION_CODE}\` |
          | Latest stable release | \`${LATEST_STABLE_TAG:-none}\` |
          | Commit | [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA}) |
          | Branch | \`${BRANCH_NAME}\` |
          | Workflow run | [#${{ github.run_number }}](${RUN_URL}) |
          | Build date | \`${BUILD_TIME_UTC}\` |
          | Build type | \`${BUILD_TYPE}\` |
          | APK size | \`${APK_SIZE_HUMAN}\` |
          | Build duration | \`${BUILD_DURATION}\` |
          EOF_SERVICE_NOTES

          echo "===== Service release notes ====="
          cat service_release_notes.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SERVICE_TAG" "$FULL_SHA"
          git push -f origin "refs/tags/${SERVICE_TAG}"

          if [[ "$SERVICE_RELEASE_EXISTS" == "true" ]]; then
            gh release edit "$SERVICE_TAG" --title "$SERVICE_TITLE" --notes-file service_release_notes.md --prerelease
          else
            gh release create "$SERVICE_TAG" --target "$FULL_SHA" --title "$SERVICE_TITLE" --notes-file service_release_notes.md --prerelease --latest=false
          fi
          upload_asset_with_retry "$SERVICE_TAG" "$SERVICE_APK" "ZDT-D-service-build.apk"
          SERVICE_UPLOAD_MODE="$UPLOAD_MODE"
          SERVICE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"

          STABLE_ACTION="skipped"
          STABLE_REASON=""
          STABLE_TAG="V${VERSION_NAME}"
          STABLE_TITLE="V ${VERSION_NAME}"
          STABLE_UPLOAD_MODE=""
          STABLE_UPLOAD_ATTEMPTS=""
          STABLE_RELEASE_EXISTS=false
          STABLE_PUBLISHED_VERSION_CODE=""

          if [[ "$stable_version_shape" != "true" ]]; then
            STABLE_REASON="version '${VERSION_NAME}' is not a stable X.Y.0 version"
          elif [[ "$version_code_matches_version" != "true" ]]; then
            STABLE_REASON="versionCode ${VERSION_CODE} is outside expected range ${code_min}..${code_max} for version ${VERSION_NAME}"
            echo "::warning::$STABLE_REASON. Stable release will not be created or updated."
          elif gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            STABLE_RELEASE_EXISTS=true
            STABLE_BODY="$(gh release view "$STABLE_TAG" --json body --jq '.body // ""')"
            STABLE_PUBLISHED_VERSION_CODE="$(printf '%s\n' "$STABLE_BODY" | parse_version_code_from_body || true)"
            STABLE_ACTION="skipped"
            STABLE_REASON="stable release ${STABLE_TAG} already exists for module.prop version ${VERSION_NAME}; service build was updated, stable release post and app-release.apk were preserved"
          else
            PREVIOUS_STABLE_TAG=""
            while IFS= read -r version; do
              [[ -z "$version" ]] && continue
              if [[ "$(printf '%s\n%s\n' "$version" "$VERSION_NAME" | sort -V | head -n1)" == "$version" && "$version" != "$VERSION_NAME" ]]; then
                PREVIOUS_STABLE_TAG="V${version}"
              fi
            done < <(git tag -l 'V[0-9]*.[0-9]*.0' | sed 's/^V//' | sort -V)

            PREVIOUS_STABLE_SHA=""
            if [[ -n "$PREVIOUS_STABLE_TAG" ]] && git rev-parse -q --verify "refs/tags/${PREVIOUS_STABLE_TAG}" >/dev/null 2>&1; then
              PREVIOUS_STABLE_SHA="$(git rev-list -n 1 "$PREVIOUS_STABLE_TAG" 2>/dev/null || true)"
            fi

            STABLE_COMPARE_URL="$(compare_url_for_range "$PREVIOUS_STABLE_SHA" "$FULL_SHA")"
            STABLE_COMMIT_LIST="$(make_commit_list "$PREVIOUS_STABLE_SHA" "$FULL_SHA" 0)"
            printf '%s\n' "$STABLE_COMMIT_LIST" > stable_commit_list.txt
            generate_service_ai_summary stable_commit_list.txt stable_ai_summary.md "$PREVIOUS_STABLE_TAG"
            STABLE_SUMMARY="$(cat stable_ai_summary.md)"

            cat > stable_release_notes.md <<EOF_STABLE_NOTES
          # ZDT-D V${VERSION_NAME}

          ## Highlights

          ${STABLE_SUMMARY}

          ## Release information

          | Field | Value |
          |---|---|
          | Version | \`${VERSION_NAME}\` |
          | Version code | \`${VERSION_CODE}\` |
          | Tag | \`${STABLE_TAG}\` |
          | Commit | [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA}) |
          | Workflow run | [#${{ github.run_number }}](${RUN_URL}) |
          | Build date | \`${BUILD_TIME_UTC}\` |
          EOF_STABLE_NOTES

            echo "===== Stable release notes ====="
            cat stable_release_notes.md

            gh release create "$STABLE_TAG" \
              --target "$FULL_SHA" \
              --title "$STABLE_TITLE" \
              --notes-file stable_release_notes.md \
              --latest

            upload_asset_with_retry "$STABLE_TAG" "$STABLE_ASSET_SPEC" "app-release.apk"
            STABLE_UPLOAD_MODE="$UPLOAD_MODE"
            STABLE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"
            STABLE_ACTION="created"
            STABLE_REASON="created new stable release ${STABLE_TAG}"
          fi

          {
            echo "### Service build publish"
            echo
            echo "Service release: \`$SERVICE_TAG\`"
            echo "Service post updated: \`true\`"
            echo "Service APK asset updated: \`ZDT-D-service-build.apk\`"
            echo "Service upload mode: \`${SERVICE_UPLOAD_MODE}\`"
            echo "Service upload attempts: \`${SERVICE_UPLOAD_ATTEMPTS}\`"
            echo "Service changelog baseline: \`${LATEST_STABLE_TAG:-none}\`"
            echo "Service compare: ${SERVICE_COMPARE_URL}"
            echo "GitHub Models AI summary: \`attempted\`"
            echo
            echo "### Stable release decision"
            echo
            echo "Version: \`${VERSION_NAME}\`"
            echo "Version code: \`${VERSION_CODE}\`"
            if [[ -n "$code_min" && -n "$code_max" ]]; then
              echo "Expected versionCode range: \`${code_min}..${code_max}\`"
            else
              echo "Expected versionCode range: \`not applicable\`"
            fi
            echo "Version shape X.Y.0: \`${stable_version_shape}\`"
            echo "versionCode matches version: \`${version_code_matches_version}\`"
            echo "Stable tag: \`${STABLE_TAG}\`"
            echo "Stable release action: \`${STABLE_ACTION}\`"
            echo "Reason: $STABLE_REASON"
            if [[ -n "$STABLE_PUBLISHED_VERSION_CODE" ]]; then
              echo "Published stable versionCode: \`${STABLE_PUBLISHED_VERSION_CODE}\`"
            fi
            if [[ -n "$STABLE_UPLOAD_MODE" ]]; then
              echo "Stable upload mode: \`${STABLE_UPLOAD_MODE}\`"
              echo "Stable upload attempts: \`${STABLE_UPLOAD_ATTEMPTS}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
