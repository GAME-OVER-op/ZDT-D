      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: false

      - name: Set up Android SDK for Go cgo
        uses: android-actions/setup-android@v3

      - name: Install Android NDK for Go cgo
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          GO_CC="$NDK_BIN/${{ matrix.clang_prefix }}24-clang"
          GO_CXX="$NDK_BIN/${{ matrix.clang_prefix }}24-clang++"
          test -x "$GO_CC" || { echo "::error::Android Go cgo compiler not found: $GO_CC"; exit 1; }
          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CC=$GO_CC"
            echo "CXX=$GO_CXX"
          } >> "$GITHUB_ENV"

      - name: Build dnscrypt-proxy from official source
        run: |
          set -euo pipefail

          go version

          WORK="$PWD/out/build/dnscrypt-proxy-android"
          SRC="$WORK/src"
          ARTIFACT_DIR="$PWD/out/artifacts/dnscrypt"
          mkdir -p "$SRC" "$ARTIFACT_DIR"

          echo "=== Fetch official dnscrypt-proxy source ==="
          git clone --depth 1 --branch "$DNSCRYPT_PROXY_REF" https://github.com/DNSCrypt/dnscrypt-proxy "$SRC/dnscrypt-proxy"
          DNSCRYPT_PROXY_COMMIT="$(git -C "$SRC/dnscrypt-proxy" rev-parse HEAD)"
          printf '%s\n' "$DNSCRYPT_PROXY_COMMIT" | tee "$ARTIFACT_DIR/dnscrypt.commit"

          echo "=== Locate dnscrypt-proxy Go module and package ==="
          if [[ -f "$SRC/dnscrypt-proxy/go.mod" ]]; then
            DNSCRYPT_BUILD_DIR="$SRC/dnscrypt-proxy"
          else
            DNSCRYPT_BUILD_DIR="$(find "$SRC/dnscrypt-proxy" -maxdepth 3 -name go.mod -type f -printf '%h\n' | sort | head -1 || true)"
          fi
          test -n "$DNSCRYPT_BUILD_DIR" || { echo "::error::dnscrypt-proxy go.mod not found"; find "$SRC/dnscrypt-proxy" -maxdepth 3 -type f | sort | head -200; exit 1; }
          pushd "$DNSCRYPT_BUILD_DIR" > /dev/null
          if [[ -d dnscrypt-proxy ]] && find dnscrypt-proxy -maxdepth 1 -name '*.go' -type f | grep -q .; then
            DNSCRYPT_PACKAGE="./dnscrypt-proxy"
          elif find . -maxdepth 1 -name '*.go' -type f | grep -q .; then
            DNSCRYPT_PACKAGE="."
          else
            DNSCRYPT_PACKAGE="$(find . -maxdepth 3 -name '*.go' -type f -printf '%h\n' | sort -u | grep -E '(^\./dnscrypt-proxy$|/dnscrypt-proxy$|/cmd/)' | head -1 || true)"
          fi
          test -n "$DNSCRYPT_PACKAGE" || { echo "::error::dnscrypt-proxy Go package not found"; find . -maxdepth 3 -type f | sort | head -200; exit 1; }
          echo "Build directory: $DNSCRYPT_BUILD_DIR"
          echo "Build package: $DNSCRYPT_PACKAGE"

          echo "=== Build dnscrypt-proxy (${DNSCRYPT_PROXY_REF}) ==="
          GOOS=android \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm }} \
          CGO_ENABLED=${{ matrix.cgo_enabled }} \
            go build \
              -trimpath \
              -buildvcs=false \
              -ldflags="-s -w -buildid=" \
              -o "$ARTIFACT_DIR/dnscrypt" \
              "$DNSCRYPT_PACKAGE"
          popd > /dev/null

          chmod 755 "$ARTIFACT_DIR/dnscrypt"

          cat > "$ARTIFACT_DIR/dnscrypt.version" <<EOF_DNSCRYPT_VERSION
          source=https://github.com/DNSCrypt/dnscrypt-proxy
          ref=$DNSCRYPT_PROXY_REF
          commit=$DNSCRYPT_PROXY_COMMIT
          upstream_binary=dnscrypt-proxy
          packaged_binary=dnscrypt
          target=android-arm64
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_DNSCRYPT_VERSION

          echo "=== Verify dnscrypt artifact ==="
          file "$ARTIFACT_DIR/dnscrypt"
          readelf -h "$ARTIFACT_DIR/dnscrypt" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/dnscrypt" | tee "$ARTIFACT_DIR/dnscrypt.dynamic.txt" || true
          "$ARTIFACT_DIR/dnscrypt" -version || true
          "$ARTIFACT_DIR/dnscrypt" -help | head -80 || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/dnscrypt.version"

      - name: Upload dnscrypt binary
        uses: actions/upload-artifact@v7
        with:
          name: dnscrypt-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/dnscrypt/dnscrypt
            out/artifacts/dnscrypt/dnscrypt.version
            out/artifacts/dnscrypt/dnscrypt.commit
            out/artifacts/dnscrypt/dnscrypt.dynamic.txt
          retention-days: 1

