          } >> "$GITHUB_ENV"

      - name: Build sing-box from official source
        run: |
          set -euo pipefail

          go version

          WORK="$PWD/out/build/sing-box-android"
          SRC="$WORK/src"
          ARTIFACT_DIR="$PWD/out/artifacts/sing-box"
          mkdir -p "$SRC" "$ARTIFACT_DIR"

          echo "=== Fetch official sing-box source ==="
          git clone --depth 1 --branch "$SING_BOX_REF" https://github.com/SagerNet/sing-box "$SRC/sing-box"
          SING_BOX_COMMIT="$(git -C "$SRC/sing-box" rev-parse HEAD)"
          SING_BOX_COMMIT_SHORT="$(git -C "$SRC/sing-box" rev-parse --short HEAD)"
          SING_BOX_VERSION="${SING_BOX_REF#v}"
          printf '%s\n' "$SING_BOX_COMMIT" | tee "$ARTIFACT_DIR/sing-box.commit"

          echo "=== Build sing-box (${SING_BOX_REF}) ==="
          pushd "$SRC/sing-box" > /dev/null
          if [[ -f release/DEFAULT_BUILD_TAGS ]]; then
            SING_BOX_TAGS="$(tr -d '\r\n' < release/DEFAULT_BUILD_TAGS)"
          elif [[ -f release/DEFAULT_BUILD_TAGS_OTHERS ]]; then
            SING_BOX_TAGS="$(tr -d '\r\n' < release/DEFAULT_BUILD_TAGS_OTHERS)"
          else
            SING_BOX_TAGS="with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_clash_api"
          fi
          # The upstream Android default tags include with_naive_outbound.
          # That feature pulls cronet-go Android native bindings and breaks
          # this pure Go cross-build with CGO_ENABLED=0. ZDT-D does not use
          # Naive outbound in this sing-box backend, so remove only that tag.
          SING_BOX_TAGS="$(printf '%s' "$SING_BOX_TAGS" | tr ',' '\n' | grep -v '^with_naive_outbound$' | paste -sd, -)"
