          retention-days: 1

  build_byedpi:
    name: build byedpi ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            module_arch: arm64-v8a
            artifact_suffix: arm64
            rust_target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            clang_target_api21: aarch64-linux-android21
            goarch: arm64
            goarm: "7"
            cgo_enabled: "0"
            android_abi: arm64-v8a
            openssl_target: android-arm64
            tor_host: aarch64-linux-android
          - abi: armeabi-v7a
            module_arch: arm-v7a
            artifact_suffix: arm32
            rust_target: armv7-linux-androideabi
            clang_prefix: armv7a-linux-androideabi
            clang_target_api21: armv7a-linux-androideabi21
            goarch: arm
            goarm: "7"
            cgo_enabled: "1"
            android_abi: armeabi-v7a
            openssl_target: android-arm
            tor_host: arm-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file \
            git \
            make

          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "BYEDPI_CC=$NDK_BIN/${{ matrix.clang_prefix }}${BYEDPI_ANDROID_API_LEVEL}-clang"
            echo "BYEDPI_STRIP=$NDK_BIN/llvm-strip"
          } >> "$GITHUB_ENV"

      - name: Build ByeDPI from official source
        run: |
          set -euo pipefail

          test -x "$BYEDPI_CC" || { echo "::error::Android C compiler not found: $BYEDPI_CC"; exit 1; }
          test -x "$BYEDPI_STRIP" || { echo "::error::Android strip not found: $BYEDPI_STRIP"; exit 1; }
          "$BYEDPI_CC" --version | head -1

          WORK="$PWD/out/build/byedpi-android"
          SRC="$WORK/src"
          ARTIFACT_DIR="$PWD/out/artifacts/byedpi"
          mkdir -p "$SRC" "$ARTIFACT_DIR"

          echo "=== Fetch official ByeDPI source ==="
          git clone --depth 1 --branch "$BYEDPI_REF" https://github.com/hufrea/byedpi "$SRC/byedpi"
          BYEDPI_COMMIT="$(git -C "$SRC/byedpi" rev-parse HEAD)"
          printf '%s\n' "$BYEDPI_COMMIT" | tee "$ARTIFACT_DIR/byedpi.commit"

          echo "=== Build ByeDPI (${BYEDPI_REF}) ==="
          pushd "$SRC/byedpi" > /dev/null
          make clean || true
          make \
            CC="$BYEDPI_CC" \
            CFLAGS="-O3 -fPIE -ffunction-sections -fdata-sections" \
            LDFLAGS="-pie -Wl,--gc-sections -Wl,-z,max-page-size=16384"

          BYEDPI_OUTPUT=""
          for candidate in ./ciadpi ./ciadpi-* ./build/ciadpi ./build/ciadpi-* ./byedpi ./build/byedpi; do
            if [[ -f "$candidate" ]]; then
              BYEDPI_OUTPUT="$candidate"
              break
            fi
          done
          if [[ -z "$BYEDPI_OUTPUT" ]]; then
            BYEDPI_OUTPUT="$(find . -maxdepth 3 -type f \( -name 'ciadpi' -o -name 'ciadpi-*' -o -name 'byedpi' \) | sort | head -1 || true)"
          fi
          test -n "$BYEDPI_OUTPUT" || { echo "::error::ByeDPI output binary not found"; find . -maxdepth 3 -type f | sort; exit 1; }
          cp -f "$BYEDPI_OUTPUT" "$ARTIFACT_DIR/byedpi"
          popd > /dev/null

          "$BYEDPI_STRIP" --strip-unneeded "$ARTIFACT_DIR/byedpi" || true
          chmod 755 "$ARTIFACT_DIR/byedpi"

          cat > "$ARTIFACT_DIR/byedpi.version" <<EOF_BYEDPI_VERSION
          source=https://github.com/hufrea/byedpi
          ref=$BYEDPI_REF
          commit=$BYEDPI_COMMIT
          upstream_binary=ciadpi
          packaged_binary=byedpi
          target=android-arm64
          android_api=$BYEDPI_ANDROID_API_LEVEL
          built_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF_BYEDPI_VERSION

          echo "=== Verify ByeDPI artifact ==="
          file "$ARTIFACT_DIR/byedpi"
          readelf -h "$ARTIFACT_DIR/byedpi" | grep -E 'Class:|Machine:'
          readelf -d "$ARTIFACT_DIR/byedpi" | tee "$ARTIFACT_DIR/byedpi.dynamic.txt" || true
          "$ARTIFACT_DIR/byedpi" --help | head -80 || true
          ls -lh "$ARTIFACT_DIR"
          cat "$ARTIFACT_DIR/byedpi.version"

      - name: Upload byedpi binary
        uses: actions/upload-artifact@v7
        with:
          name: byedpi-${{ matrix.artifact_suffix }}
          path: |
            out/artifacts/byedpi/byedpi
            out/artifacts/byedpi/byedpi.version
            out/artifacts/byedpi/byedpi.commit
            out/artifacts/byedpi/byedpi.dynamic.txt
          retention-days: 1

