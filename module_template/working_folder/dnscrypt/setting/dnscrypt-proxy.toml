##############################################
#        dnscrypt-proxy configuration        #
##############################################

server_names = [
  # Cloudflare
  'cloudflare',
  'cloudflare-security',
  'cloudflare-family',

  # Quad9
  'quad9-dnscrypt-ip4-filter-pri',
  'quad9-doh-ip4-port443-filter-pri',

  # Google
  'google',

  # AdGuard
  'adguard-dns',
  'adguard-dns-doh',
  'adguard-dns-family-doh',
  'adguard-dns-unfiltered-doh',

  # Mullvad
  'mullvad-doh',
  'mullvad-adblock-doh',
  'mullvad-base-doh',

  # Other public resolvers
  'dns.sb',
  'wikimedia',
  'dns4eu-protective',
  'alidns-doh',
  'comss.one',

  # Custom static DoH
  'xbox-dns-ru',
  'ru-mow-doh-sb',
  'router-comss-one',
  'doh-kel-pe',
  'dns-adnull',
  'adfreedns-top'
]

listen_addresses = ['127.0.0.1:863', '[::1]:863']

max_clients = 1024

##############################################
#        Фильтр серверов                     #
##############################################

ipv4_servers = true
ipv6_servers = false

dnscrypt_servers = true
doh_servers = true
odoh_servers = false

require_dnssec = false
require_nolog = false
require_nofilter = false

disabled_server_names = []

##############################################
#        Сеть / протоколы                    #
##############################################

force_tcp = true

http3 = false
http3_probe = false

#proxy = 'socks5://127.0.0.1:2080'

timeout = 7000
keepalive = 30

##############################################
#        Безопасность / нагрузка             #
##############################################

dnscrypt_ephemeral_keys = false

##############################################
#        Bootstrap DNS                       #
##############################################

bootstrap_resolvers = [
  '1.1.1.1:53',
  '9.9.9.9:53',
  '8.8.8.8:53'
]

ignore_system_dns = true

netprobe_timeout = 120
netprobe_address = '1.1.1.1:53'

##############################################
#        Логи                                #
##############################################

log_file = '/data/adb/modules/ZDT-D/working_folder/dnscrypt/log/dnscrypt-proxy.log'

log_files_max_size = 1
log_files_max_age = 3
log_files_max_backups = 0

##############################################
#        Фильтрация                          #
##############################################

block_ipv6 = false
block_unqualified = true
block_undelegated = true
reject_ttl = 44

##############################################
#        DNS cache                           #
##############################################

cache = true
cache_size = 10000

cache_min_ttl = 600
cache_max_ttl = 3600

cache_neg_min_ttl = 60
cache_neg_max_ttl = 600

lb_estimator = true

##############################################
#        Cloaking / Forwarding               #
##############################################

cloaking_rules = 'cloaking-rules.txt'
cloak_ptr = false
forwarding_rules = 'forwarding-rules.txt'

##############################################
#        Blocklists TXT файлы                #
##############################################

[blocked_names]
blocked_names_file = 'blocked-names.txt'

[blocked_ips]
blocked_ips_file = 'blocked-ips.txt'

[allowed_names]
allowed_names_file = 'allowed-names.txt'

[allowed_ips]
allowed_ips_file = 'allowed-ips.txt'

##############################################
#        Captive portals                     #
##############################################

[captive_portals]
# map_file = 'captive-portals.txt'

##############################################
#        Отключён anonymized DNS             #
##############################################

[anonymized_dns]
routes = []

##############################################
#        Monitoring UI                       #
##############################################

[monitoring_ui]
enabled = false
listen_address = "127.0.0.1:8080"
username = "admin"
password = "changeme"

##############################################
#        Sources                             #
##############################################

[sources]

  [sources.public-resolvers]
  urls = [
    'https://download.dnscrypt.info/resolvers-list/v3/public-resolvers.md',
    'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
    'https://cdn.jsdelivr.net/gh/DNSCrypt/dnscrypt-resolvers@master/v3/public-resolvers.md'
  ]
  cache_file = 'public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
  refresh_delay = 168
  prefix = ''

##############################################
#        Static custom DoH                   #
##############################################

[static]

